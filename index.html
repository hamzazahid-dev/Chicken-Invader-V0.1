            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    try { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    try { audioCtx.resume(); } catch (e) {}
                }
                return audioCtx;
            }

            function playSound(type) {
                try {
                    const ctx = initAudio();
                    if (!ctx) return;
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    gain.connect(ctx.destination);
                    osc.connect(gain);
                    switch (type) {
                        case 'shoot':
                            osc.type = 'square';
                            osc.frequency.setValueAtTime(800, ctx.currentTime);
                            osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.06);
                            gain.gain.setValueAtTime(0.05, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
                            osc.start(ctx.currentTime);
                            osc.stop(ctx.currentTime + 0.06);
                            break;
                        case 'explode':
                            osc.type = 'sawtooth';
                            osc.frequency.setValueAtTime(200, ctx.currentTime);
                            osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.25);
                            gain.gain.setValueAtTime(0.08, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                            osc.start(ctx.currentTime);
                            osc.stop(ctx.currentTime + 0.25);
                            break;
                        case 'powerup':

                            osc.frequency.setValueAtTime(600, ctx.currentTime);

                            osc.start(ctx.currentTime);
                            osc.stop(ctx.currentTime + 0.35);
                            break;
                        case 'gameover':

                            osc.frequency.setValueAtTime(400, ctx.currentTime);

            function makePixelArt(rows, cols, data, color, scale) {
                const key = rows + 'x' + cols + color + scale + data.join('');
                if (spriteCache.has(key)) return spriteCache.get(key);
                const surf = document.createElement('canvas');
                surf.width = cols;
                surf.height = rows;
                const sctx = surf.getContext('2d');
                for (let y = 0; y < rows; y++) {
                    const row = data[y];
                    if (!row) continue;
                    for (let x = 0; x < cols; x++) {
                        if (row[x]) {
                            sctx.fillStyle = color;
                            sctx.fillRect(x, y, 1, 1);
                        }
                    }
                }
                const img = new Image();
                img.src = surf.toDataURL();
                spriteCache.set(key, img);
                return img;

            const tankChickenSprite = makePixelArt(10, 10, TANK_CHICKEN, '#66dd88', 3);
            const greenMonsterSprite = makePixelArt(8, 8, GREEN_MONSTER, '#66ff66', 4);
            const bomberSprite = makePixelArt(9, 9, BOMBER_PIXELS, '#ff3366', 3.5);
            const bulletSprite = makePixelArt(4, 4, BULLET_PIXELS, '#66ddff', 2);
            const bossSprite = makePixelArt(16, 16, BOSS_PIXELS, '#ff3366', 3);
            const shieldSprite = makePixelArt(4, 4, SHIELD_PIXELS, '#44ddff', 5);
            const rapidSprite = makePixelArt(4, 4, RAPID_PIXELS, '#ffaa44', 5);
            const multiSprite = makePixelArt(5, 5, MULTI_PIXELS, '#ff66ff', 4);
            const coinSprite = makePixelArt(4, 4, COIN_PIXELS, '#ffdd44', 5);

            // Ship sprites
            const shipSprites = {};
            for (const s of SHIPS) {
                const rows = s.pixels.length;
                const cols = s.pixels[0].length;
                shipSprites[s.id] = makePixelArt(rows, cols, s.pixels, s.color, 3);
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── CONSTANTS ──────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            const PLAYER_W = 36,
                PLAYER_H = 36;
            const BULLET_SPEED = 9;
            const BULLET_W = 8,
                BULLET_H = 8;
            const CHICKEN_W = 32,
                CHICKEN_H = 32;
            const BOSS_W = 48,
                BOSS_H = 48;
            const STAGES_PER_LEVEL = 8;
            const BASE_CHICKENS_PER_WAVE = 6;
            const ENEMY_BULLET_SPEED = 2.5;

            function getDifficultyMultiplier() {
                const d = options.difficulty || 'normal';
                switch (d) {
                    case 'easy':
                        return 0.7;
                    case 'hard':
                        return 1.4;
                    default:
                        return 1.0;
                }
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── STATE ──────────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            let appState = 'menu';
            let menuTime = 0;
            let menuSelected = 0;
            let menuHover = -1;
            let menuFlash = 0;
            const mainMenuItems = [
                { id: 'play', label: '🚀 PLAY', y: 340 },
                { id: 'shop', label: '🛒 SHOP', y: 410 },
                { id: 'achievements', label: '🏆 ACHIEVEMENTS', y: 480 },
                { id: 'stats', label: '📊 STATS', y: 550 },
                { id: 'options', label: '⚙️ OPTIONS', y: 620 },
            ];
            let currentMenu = 'main';
            let menuItems = mainMenuItems;

            // ─── ─────────────────────────────────────────────────────
            // ─── INPUT ──────────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            const keys = { left: false, right: false, space: false };
            let spacePressed = false;

            function getCanvasCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX - rect.left;
                    clientY = e.touches[0].clientY - rect.top;
                } else {
                    clientX = e.clientX - rect.left;
                    clientY = e.clientY - rect.top;
                }
                return { x: clientX * scaleX, y: clientY * scaleY };
            }

            function isRect(x, y, w, h, cx, cy) {
                return cx >= x && cx <= x + w && cy >= y && cy <= y + h;
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── GAME FUNCTIONS ─────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            function startGame() {
                const ship = SHIPS[game.selectedShip];
                game.stage = 1;
                game.score = 0;
                game.combo = 0;
                game.comboTimeout = 0;
                game.chickensKilled = 0;
                game.chickensInWave = 0;
                game.chickensSpawnedInWave = 0;
                game.waveActive = false;
                game.bossActive = false;
                game.bossDefeated = false;
                game.gameOver = false;
                game.levelComplete = false;
                game.frame = 0;
                game.spawnTimer = 0;
                game.bossIntro = 0;
                game.bossPhase = 0;
                game.bossBullets = [];
                game.enemyBullets = [];
                game.powerups = [];
                game.particles = [];
                game.deathParticles = [];
                game.screenShake = 0;
                game.achievementQueue = [];
                game.showLevelUp = false;
                game.levelUpTimer = 0;
                game.perfectLevel = true;
                game.dying = false;
                game.deathTimer = 0;
                game.shootCooldown = 0;
                game.boss = null;
                game.bossLevelUpProcessed = false;

                const baseShield = ship.shield * (1 + game.upgrades.shield * 0.2);
                game.player = {
                    x: W / 2 - PLAYER_W / 2,
                    y: H - 80,
                    w: PLAYER_W,
                    h: PLAYER_H,
                    lives: 3,
                    shield: false,
                    hasRapid: false,
                    hasMulti: false,
                    invincible: 120,
                };
                game.bullets = [];
                game.chickens = [];
                game.boss = null;

                // Star field
                game.starField = [];
                for (let i = 0; i < 120; i++) {
                    game.starField.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        s: 0.5 + Math.random() * 1.5,
                        speed: 0.2 + Math.random() * 0.5,
                    });
                }

                appState = 'playing';
                game.screenShake = 0;

                game._shipSpeed = ship.speed * (1 + game.upgrades.speed * 0.1);
                game._shipFireRate = ship.fireRate * (1 - game.upgrades.fireRate * 0.06);
                game._shipDamage = ship.damage * (1 + game.upgrades.damage * 0.15);
                game._shipShield = ship.shield * (1 + game.upgrades.shield * 0.2);
                game._shipFireRate = Math.max(0.4, game._shipFireRate);
                game._shipSpeed = Math.max(0.5, game._shipSpeed);

                startWave();
            }

            function startWave() {
                // CRITICAL FIX: Reset boss-related flags when starting a new wave
                game.bossDefeated = false;
                game.bossActive = false;
                game.boss = null;
                game.bossBullets = [];
                game.bossIntro = 0;
                game.bossPhase = 0;
                game.bossLevelUpProcessed = false;
                game.levelComplete = false;

                const diffMul = getDifficultyMultiplier();
                const count = Math.round((BASE_CHICKENS_PER_WAVE + Math.floor((game.level - 1) * 1.5)) * diffMul);
                game.chickensInWave = Math.max(3, count);
                game.chickensSpawnedInWave = 0;
                game.waveActive = true;
                game.spawnTimer = 0;
            }

            function spawnChicken() {
                const x = Math.random() * (W - CHICKEN_W);
                const diffMul = getDifficultyMultiplier();
                let type = 'normal';
                const r = Math.random();
                const fastChance = 0.2 * (diffMul > 1 ? 1.3 : diffMul < 1 ? 0.7 : 1);
                const tankChance = 0.3 * (diffMul > 1 ? 1.2 : diffMul < 1 ? 0.7 : 1);
                const shooterChance = Math.min(0.2, 0.05 + (game.level - 2) * 0.025);
                const bomberChance = Math.min(0.15, 0.03 + (game.level - 3) * 0.02);

                if (game.level > 2 && r < fastChance) type = 'fast';
                else if (game.level > 4 && r < tankChance) type = 'tank';
                else if (game.level >= 2 && r < shooterChance) type = 'shooter';
                else if (game.level >= 3 && r < bomberChance) type = 'bomber';

                let w = CHICKEN_W,
                    h = CHICKEN_H,
                    speed, hp = 1,
                    sprite, points = 10;
                const baseSpeed = 1.5 + (game.level - 1) * 0.18;

                switch (type) {
                    case 'fast':
                        w = 24;
                        h = 24;
                        speed = (2.8 + (game.level - 1) * 0.25 + Math.random() * 0.4) * (diffMul > 1 ? 1.2 : 1);
                        hp = 1;
                        sprite = fastChickenSprite;
                        points = 15;
                        break;
                    case 'tank':
                        w = 40;
                        h = 40;
                        speed = (1.0 + (game.level - 1) * 0.08 + Math.random() * 0.2) * (diffMul > 1 ? 1.1 : 1);
                        hp = Math.round(3 * (diffMul > 1 ? 1.3 : diffMul < 1 ? 0.7 : 1));
                        hp = Math.max(1, hp);
                        sprite = tankChickenSprite;
                        points = 25;
                        break;
                    case 'shooter':
                        w = 32;
                        h = 32;
                        speed = (1.0 + (game.level - 1) * 0.1 + Math.random() * 0.2) * (diffMul > 1 ? 1.1 : 1);
                        hp = Math.round(2 * (diffMul > 1 ? 1.2 : diffMul < 1 ? 0.8 : 1));
                        hp = Math.max(1, hp);
                        sprite = greenMonsterSprite;
                        points = 20;
                        break;
                    case 'bomber':
                        w = 30;
                        h = 30;
                        speed = (1.2 + (game.level - 1) * 0.12 + Math.random() * 0.2) * (diffMul > 1 ? 1.1 : 1);
                        hp = Math.round(2 * (diffMul > 1 ? 1.2 : diffMul < 1 ? 0.8 : 1));
                        hp = Math.max(1, hp);
                        sprite = bomberSprite;
                        points = 30;
                        break;
                    default:
                        speed = (baseSpeed + Math.random() * 0.5) * (diffMul > 1 ? 1.15 : 1);
                        hp = 1;
                        sprite = chickenSprite;
                        points = 10;
                        break;
                }

                game.chickens.push({
                    x,
                    y: -h,
                    w,
                    h,
                    speed: Math.min(speed, 6.5),
                    hp: hp,
                    maxHp: hp,
                    type: type,
                    sprite: sprite,
                    points: points,
                    shootTimer: 0,
                    shootInterval: 40 + Math.floor(Math.random() * 30),
                    hitFlash: 0,
                });
                game.chickensSpawnedInWave++;
            }

            function spawnPowerup(x, y) {
                const dropRate = 0.2 * (options.difficulty === 'easy' ? 1.3 : options.difficulty === 'hard' ? 0.8 : 1);
                if (Math.random() > dropRate) return;
                const types = ['shield', 'rapid', 'multi', 'coin'];
                const weights = [20, 20, 15, 45];
                let total = weights.reduce((a, b) => a + b, 0);
                let r = Math.random() * total;
                let type = 'coin';
                for (let i = 0; i < weights.length; i++) {
                    r -= weights[i];
                    if (r <= 0) { type = types[i]; break; }
                }
                let sprite;
                switch (type) {
                    case 'shield':
                        sprite = shieldSprite;
                        break;
                    case 'rapid':
                        sprite = rapidSprite;
                        break;
                    case 'multi':
                        sprite = multiSprite;
                        break;
                    default:
                        sprite = coinSprite;
                        break;
                }
                game.powerups.push({
                    x: x - 12,
                    y: y - 12,
                    w: 24,
                    h: 24,
                    type: type,
                    sprite: sprite,
                    speed: 1.5,
                    bob: Math.random() * Math.PI * 2,
                });
            }

            function spawnParticles(x, y, color, count = 15, speedMult = 1, sizeMult = 1) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = (0.5 + Math.random() * 4) * speedMult;
                    game.particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 0.5,
                        life: 20 + Math.random() * 30,
                        maxLife: 50,
                        size: (1 + Math.random() * 4) * sizeMult,
                        color: color,
                    });
                }
            }

            function spawnBoss() {
                const diffMul = getDifficultyMultiplier();
                const health = Math.round((40 + game.level * 18) * (diffMul > 1 ? 1.4 : diffMul < 1 ? 0.7 : 1));
                game.boss = {
                    x: W / 2 - BOSS_W / 2,
                    y: -BOSS_H - 20,
                    w: BOSS_W,
                    h: BOSS_H,
                    health: health,
                    maxHealth: health,
                    speed: (1.5 + game.level * 0.1) * (diffMul > 1 ? 1.15 : 1),
                    dir: 1,
                    phase: 0,
                    attackTimer: 0,
                    attackInterval: Math.round((35 - Math.min(game.level, 10)) * (diffMul > 1 ? 0.85 : diffMul < 1 ? 1.15 :
                        1)),
                    enterY: 50 + Math.random() * 30,
                    entered: false,
                    pattern: 0,
                    hitFlash: 0,
                };
                game.bossActive = true;
                game.bossDefeated = false;
                game.bossIntro = 60;
                game.waveActive = false;
                game.bossPhase = 0;
                game.bossLevelUpProcessed = false;
            }

            function bossShoot() {
                const boss = game.boss;
                if (!boss || game.gameOver) return;
                const angle = Math.atan2(game.player.y - boss.y, game.player.x - boss.x);
                const speed = (2.8 + game.level * 0.12) * (options.difficulty === 'hard' ? 1.15 : 1);
                const spread = 0.3 + game.bossPhase * 0.05;

                game.bossBullets.push({
                    x: boss.x + boss.w / 2 - 6,
                    y: boss.y + boss.h - 4,
                    w: 12,
                    h: 12,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                });

                if (game.bossPhase >= 1) {
                    game.bossBullets.push({
                        x: boss.x + boss.w / 2 - 6,
                        y: boss.y + boss.h - 4,
                        w: 12,
                        h: 12,
                        vx: Math.cos(angle - spread) * speed * 0.9,
                        vy: Math.sin(angle - spread) * speed * 0.9,
                    });
                    game.bossBullets.push({
                        x: boss.x + boss.w / 2 - 6,
                        y: boss.y + boss.h - 4,
                        w: 12,
                        h: 12,
                        vx: Math.cos(angle + spread) * speed * 0.9,
                        vy: Math.sin(angle + spread) * speed * 0.9,
                    });
                }

                if (game.bossPhase >= 2) {
                    for (let i = 0; i < 12; i++) {
                        const a = (i / 12) * Math.PI * 2 + game.frame * 0.03;
                        game.bossBullets.push({
                            x: boss.x + boss.w / 2 - 5,
                            y: boss.y + boss.h / 2 - 5,
                            w: 10,
                            h: 10,
                            vx: Math.cos(a) * 2.5,
                            vy: Math.sin(a) * 2.5,
                        });
                    }
                }
            }

            function triggerDeathAnimation() {
                if (game.dying) return;
                if (game.player.invincible > 0) return;
                game.dying = true;
                game.deathTimer = 0;
                game.player.invincible = 0;
                game.screenShake = 15;
                playSound('explode');
                if (options.vibration && navigator.vibrate) { navigator.vibrate([100, 50, 100]); }

                const px = game.player.x + game.player.w / 2;
                const py = game.player.y + game.player.h / 2;
                const colors = ['#ff4444', '#ff8844', '#ffdd44', '#44ddff', '#ff66ff', '#ffffff'];
                for (let i = 0; i < 60; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 7;
                    game.deathParticles.push({
                        x: px + (Math.random() - 0.5) * 25,
                        y: py + (Math.random() - 0.5) * 25,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 1,
                        life: 40 + Math.random() * 35,
                        maxLife: 75,
                        size: 2 + Math.random() * 7,
                        color: colors[Math.floor(Math.random() * colors.length)],
                    });
                }
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1 + Math.random() * 4;
                    game.deathParticles.push({
                        x: px + (Math.random() - 0.5) * 15,
                        y: py + (Math.random() - 0.5) * 15,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 2,
                        life: 50 + Math.random() * 35,
                        maxLife: 85,
                        size: 1 + Math.random() * 3,
                        color: '#66ddff',
                    });
                }
                game.player.lives--;
                game.perfectLevel = false;
                if (game.player.lives < 0) game.player.lives = 0;
            }

            function updateDeathAnimation() {
                if (!game.dying) return;
                game.deathTimer++;
                for (let i = game.deathParticles.length - 1; i >= 0; i--) {
                    const pt = game.deathParticles[i];
                    pt.x += pt.vx;
                    pt.y += pt.vy;
                    pt.vy += 0.08;
                    pt.life--;
                    if (pt.life <= 0) { game.deathParticles.splice(i, 1); }
                }
                if (game.screenShake > 0) {
                    game.screenShake *= 0.95;
                    if (game.screenShake < 0.1) game.screenShake = 0;
                }
                if (game.deathTimer > 60 || game.deathParticles.length === 0) {
                    game.dying = false;
                    game.deathParticles = [];
                    game.screenShake = 0;
                    if (game.player.lives <= 0) {
                        game.gameOver = true;
                        appState = 'gameover';
                        playSound('gameover');
                        game.totalGames++;
                        if (game.score > game.highScore) {
                            game.highScore = game.score;
                            showToast('🏆 NEW HIGH SCORE: ' + game.highScore + '!');
                        }
                        if (game.level > game.highestLevel) { game.highestLevel = game.level; }
                        saveData();
                        checkAchievements();
                    } else {
                        game.player.x = W / 2 - PLAYER_W / 2;
                        game.player.y = H - 80;
                        game.player.invincible = 120;
                        game.player.hasRapid = false;
                        game.player.hasMulti = false;
                        game.player.shield = false;
                        spawnParticles(game.player.x + game.player.w / 2, game.player.y + game.player.h / 2, '#66ddff',
                            25, 0.5);
                        spawnParticles(game.player.x + game.player.w / 2, game.player.y + game.player.h / 2, '#ffffff',
                            12, 0.3);
                        showToast('💪 Respawn!', 1000);
                    }
                }
            }

            function checkAchievements() {
                let unlocked = false;
                for (const a of ACHIEVEMENTS) {
                    if (!game.achievements.includes(a.id) && a.check()) {
                        game.achievements.push(a.id);
                        game.achievementQueue.push(a);
                        unlocked = true;
                        playSound('achievement');
                        const coinReward = a.id === 'first_kill' ? 10 : a.id.includes('kill_500') ? 100 : a.id.includes(
                            'score_5000') ? 80 : 30;
                        game.coins += coinReward;
                        showToast('🏆 ' + a.icon + ' ' + a.name + '! (+' + coinReward + ' coins)', 3000);
                        saveData();
                    }
                }
                if (unlocked) saveData();
            }

            // ─── FIXED: checkLevelUp ────────────────────────────────
            // Only triggers ONCE per boss defeat, resets bossDefeated flag properly
            function checkLevelUp() {
                // Only run if boss is defeated, level is not complete, and we haven't already processed this defeat
                if (!game.bossDefeated || game.levelComplete || game.bossLevelUpProcessed) return;

                // Mark as processed so we don't trigger again
                game.bossLevelUpProcessed = true;

                game.levelComplete = true;
                game.showLevelUp = true;
                game.levelUpTimer = 120;
                playSound('levelup');

                const bonus = 20 + game.level * 5;
                game.coins += bonus;
                showToast('⭐ LEVEL ' + game.level + ' COMPLETE! +' + bonus + ' coins ⭐', 2500);
                saveData();

                if (game.level > game.highestLevel) {
                    game.highestLevel = game.level;
                    saveData();
                }
                checkAchievements();

                // After the animation, advance to the next level
                setTimeout(() => {
                    game.showLevelUp = false;
                    game.level++;
                    game.stage = 1;
                    game.levelComplete = false;
                    // CRITICAL: Reset boss flags before starting next wave
                    game.bossDefeated = false;
                    game.bossActive = false;
                    game.boss = null;
                    game.bossBullets = [];
                    game.bossIntro = 0;
                    game.bossPhase = 0;
                    game.bossLevelUpProcessed = false;
                    if (!game.gameOver) {
                        startWave();
                    }
                }, 2500);
            }

            function shoot() {
                if (game.gameOver || game.bossIntro > 0 || game.dying) return;
                if (game.shootCooldown > 0) return;
                playSound('shoot');

                const ship = SHIPS[game.selectedShip];
                const fireRate = ship.fireRate * (1 - game.upgrades.fireRate * 0.06);
                const baseCd = Math.max(3, Math.round(8 * fireRate));
                game.shootCooldown = game.player.hasRapid ? Math.max(2, baseCd / 2) : baseCd;

                const bx = game.player.x + game.player.w / 2 - BULLET_W / 2;
                const by = game.player.y - 6;
                const dmg = game._shipDamage || 1;

                if (game.player.hasMulti) {
                    game.bullets.push({ x: bx - 10, y: by, w: BULLET_W, h: BULLET_H, dmg: dmg });
                    game.bullets.push({ x: bx, y: by - 3, w: BULLET_W, h: BULLET_H, dmg: dmg * 1.2 });
                    game.bullets.push({ x: bx + 10, y: by, w: BULLET_W, h: BULLET_H, dmg: dmg });
                } else {
                    game.bullets.push({ x: bx, y: by, w: BULLET_W, h: BULLET_H, dmg: dmg });
                }
            }

            function applyPowerup(type) {
                playSound('powerup');
                switch (type) {
                    case 'shield':
                        game.player.shield = true;
                        spawnParticles(game.player.x + game.player.w / 2, game.player.y + game.player.h / 2, '#44ddff',
                            20);
                        showToast('🛡️ SHIELD ACTIVATED!', 800);
                        break;
                    case 'rapid':
                        game.player.hasRapid = true;
                        spawnParticles(game.player.x + game.player.w / 2, game.player.y + game.player.h / 2, '#ffaa44',
                            20);
                        showToast('⚡ RAPID FIRE!', 800);
                        break;
                    case 'multi':
                        game.player.hasMulti = true;
                        spawnParticles(game.player.x + game.player.w / 2, game.player.y + game.player.h / 2, '#ff66ff',
                            20);
                        showToast('✧ MULTI-SHOT!', 800);
                        break;
                    case 'coin':
                        const bonus = 5 + Math.floor(Math.random() * 10);
                        game.coins += bonus;
                        spawnParticles(game.player.x + game.player.w / 2, game.player.y + game.player.h / 2, '#ffdd44',
                            15);
                        showToast('💰 +' + bonus + ' coins!', 600);
                        break;
                }
                saveData();
            }

            function rectCollide(a, b) {
                return a.x < b.x + b.w && a.x + a.w > b.x &&
                    a.y < b.y + b.h && a.y + a.h > b.y;
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── UPDATE ─────────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            function updateGame() {
                if (game.gameOver) return;
                if (game.dying) { updateDeathAnimation(); return; }
                game.frame++;

                // Level up check (now safe - only triggers once per boss defeat)
                checkLevelUp();

                // If level is complete, skip everything else (waiting for animation)
                if (game.levelComplete) return;

                // Player movement
                const speed = 4.5 * (game._shipSpeed || 1);
                if (keys.left && game.player.x > 0) game.player.x -= speed;
                if (keys.right && game.player.x + game.player.w < W) game.player.x += speed;

                if (game.player.invincible > 0) game.player.invincible--;
                if (game.comboTimeout > 0) {
                    game.comboTimeout--;
                    if (game.comboTimeout === 0) game.combo = 0;
                }

                // Shooting
                if (spacePressed && !game.gameOver && game.bossIntro === 0) {
                    shoot();
                    spacePressed = false;
                }
                if (game.touchShoot && !game.gameOver && game.bossIntro === 0) {
                    shoot();
                }
                if (game.shootCooldown > 0) game.shootCooldown--;

                // ── Bullets ──
                for (let i = game.bullets.length - 1; i >= 0; i--) {
                    const b = game.bullets[i];
                    b.y -= BULLET_SPEED;
                    if (b.y + b.h < 0) { game.bullets.splice(i, 1); continue; }

                    let used = false;
                    for (let j = game.chickens.length - 1; j >= 0; j--) {
                        const c = game.chickens[j];
                        if (rectCollide(b, c)) {
                            c.hp -= b.dmg || 1;
                            c.hitFlash = 8;
                            spawnParticles(b.x, b.y, '#ff8844', 5, 0.5);
                            if (c.hp <= 0) {
                                if (c.type === 'bomber') {
                                    spawnParticles(c.x + c.w / 2, c.y + c.h / 2, '#ff3366', 40, 1.5);
                                    for (let k = game.chickens.length - 1; k >= 0; k--) {
                                        if (k === j) continue;
                                        const other = game.chickens[k];
                                        const dx = other.x - c.x;
                                        const dy = other.y - c.y;
                                        if (Math.sqrt(dx * dx + dy * dy) < 100) {
                                            other.hp -= 2;
                                            if (other.hp <= 0) {
                                                game.chickens.splice(k, 1);
                                                game.chickensKilled++;
                                                game.combo++;
                                                game.comboTimeout = 60;
                                                let pts = other.points || 10;
                                                pts += Math.floor(game.combo / 5) * 2;
                                                game.score += pts;
                                                spawnParticles(other.x + other.w / 2, other.y + other.h / 2, '#ff8844',
                                                    10);
                                                spawnPowerup(other.x + other.w / 2, other.y + other.h / 2);
                                                game.totalKills++;
                                            }
                                        }
                                    }
                                    game.screenShake = 10;
                                    playSound('explode');
                                }
                                game.chickens.splice(j, 1);
                                game.chickensKilled++;
                                game.combo++;
                                game.comboTimeout = 60;
                                if (game.combo > game.maxCombo) game.maxCombo = game.combo;
                                let pts = c.points || 10;
                                pts += Math.floor(game.combo / 5) * 2;
                                game.score += pts;
                                game.totalKills++;
                                spawnParticles(c.x + c.w / 2, c.y + c.h / 2, '#ff8844', 12);
                                spawnPowerup(c.x + c.w / 2, c.y + c.h / 2);
                                if (game.combo > 5) game.screenShake = Math.min(3, game.combo / 5);
                                game.perfectLevel = false;
                            }
                            used = true;
                            break;
                        }
                    }
                    if (used) { game.bullets.splice(i, 1); continue; }

                    if (game.boss && !game.bossDefeated && rectCollide(b, game.boss)) {
                        game.boss.health -= (b.dmg || 1);
                        game.boss.hitFlash = 8;
                        spawnParticles(b.x, b.y, '#ff3366', 8);
                        game.screenShake = 4;
                        if (game.boss.health <= 0) {
                            game.boss.health = 0;
                            game.bossDefeated = true;
                            game.bossActive = false;
                            game.score += 100 + game.level * 25;
                            spawnParticles(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#ffaa00', 60,
                            2);
                            game.screenShake = 20;
                            game.coins += 50 + game.level * 5;
                            playSound('explode');
                            showToast('💀 BOSS DEFEATED! +' + (50 + game.level * 5) + ' coins!', 2000);
                            // Trigger level up (will only run once due to bossLevelUpProcessed flag)
                            checkLevelUp();
                            saveData();
                        }
                        game.bullets.splice(i, 1);
                        continue;
                    }
                }

                // ── Enemy bullets ──
                for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
                    const eb = game.enemyBullets[i];
                    eb.x += eb.vx;
                    eb.y += eb.vy;
                    if (eb.y > H + 20 || eb.x < -20 || eb.x > W + 20) {
                        game.enemyBullets.splice(i, 1);
                        continue;
                    }
                    if (rectCollide(eb, game.player) && game.player.invincible === 0) {
                        triggerDeathAnimation();
                        game.enemyBullets.splice(i, 1);
                        if (game.dying) return;
                    }
                }

                // ── Boss bullets ──
                for (let i = game.bossBullets.length - 1; i >= 0; i--) {
                    const bb = game.bossBullets[i];
                    bb.x += bb.vx;
                    bb.y += bb.vy;
                    if (bb.y > H + 20 || bb.x < -20 || bb.x > W + 20) {
                        game.bossBullets.splice(i, 1);
                        continue;
                    }
                    if (rectCollide(bb, game.player) && game.player.invincible === 0) {
                        triggerDeathAnimation();
                        game.bossBullets.splice(i, 1);
                        if (game.dying) return;
                    }
                }

                // ── Boss logic ──
                if (game.bossActive && game.boss && !game.bossDefeated) {
                    const boss = game.boss;
                    if (boss.hitFlash > 0) boss.hitFlash--;

                    if (game.bossIntro > 0) {
                        game.bossIntro--;
                        boss.y += (boss.enterY - boss.y) * 0.05;
                        if (game.bossIntro === 0) boss.entered = true;
                    } else if (boss.entered) {
                        boss.phase += 0.025;
                        const pattern = Math.floor(boss.phase / 10) % 3;
                        const amp = 100 + Math.sin(game.level * 0.5) * 15;

                        const hpRatio = boss.health / boss.maxHealth;
                        if (hpRatio < 0.4) game.bossPhase = 2;
                        else if (hpRatio < 0.7) game.bossPhase = 1;
                        else game.bossPhase = 0;

                        const speedMult = 1 + game.bossPhase * 0.15;

                        if (pattern === 0) {
                            boss.x += boss.speed * boss.dir * speedMult;
                            boss.y = boss.enterY + Math.sin(boss.phase * 1.5) * 25;
                            if (boss.x + boss.w > W || boss.x < 0) boss.dir *= -1;
                        } else if (pattern === 1) {
                            boss.x += boss.speed * 1.8 * boss.dir * speedMult;
                            boss.y = boss.enterY + Math.sin(boss.phase * 0.7) * 18;
                            if (boss.x + boss.w > W || boss.x < 0) boss.dir *= -1;
                        } else {
                            boss.x = W / 2 + Math.sin(boss.phase * 0.9) * amp * 0.5;
                            boss.y = boss.enterY + Math.cos(boss.phase * 0.6) * 30;
                        }
                        boss.x = Math.max(0, Math.min(W - boss.w, boss.x));
                        boss.y = Math.max(10, Math.min(H - 120, boss.y));

                        boss.attackTimer++;
                        const interval = Math.max(14, boss.attackInterval - game.bossPhase * 2);
                        if (boss.attackTimer >= interval) {
                            boss.attackTimer = 0;
                            bossShoot();
                        }
                    }
                }

                // ── Wave spawning ──
                if (game.waveActive && !game.bossActive && !game.levelComplete) {
                    const diffMul = getDifficultyMultiplier();
                    const delay = Math.max(2, Math.round((12 - Math.floor(game.level * 0.8)) / (diffMul > 1 ? 1.2 : diffMul <
                        1 ? 0.8 : 1)));
                    game.spawnTimer++;
                    if (game.spawnTimer >= delay && game.chickensSpawnedInWave < game.chickensInWave) {
                        game.spawnTimer = 0;
                        spawnChicken();
                    }
                    if (game.chickensSpawnedInWave >= game.chickensInWave && game.chickens.length === 0) {
                        game.waveActive = false;
                        game.stage++;
                        if (game.stage > STAGES_PER_LEVEL) {
                            spawnBoss();
                        } else {
                            setTimeout(() => {
                                if (!game.gameOver && !game.bossActive && !game.levelComplete) startWave();
                            }, 400);
                        }
                    }
                }

                // ── Move chickens ──
                for (let i = game.chickens.length - 1; i >= 0; i--) {
                    const c = game.chickens[i];
                    if (c.hitFlash > 0) c.hitFlash--;
                    c.y += c.speed;

                    if (c.type === 'shooter') {
                        c.shootTimer++;
                        if (c.shootTimer >= c.shootInterval) {
                            c.shootTimer = 0;
                            const angle = Math.atan2(game.player.y - c.y, game.player.x - c.x);
                            const speed = ENEMY_BULLET_SPEED * (options.difficulty === 'hard' ? 1.3 : 1);
                            game.enemyBullets.push({
                                x: c.x + c.w / 2 - 4,
                                y: c.y + c.h / 2,
                                w: 8,
                                h: 8,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed,
                            });
                            spawnParticles(c.x + c.w / 2, c.y + c.h, '#66ff66', 4);
                        }
                    }

                    if (c.y + c.h > H) {
                        if (game.player.invincible === 0) {
                            triggerDeathAnimation();
                            game.chickens.splice(i, 1);
                            if (game.dying) return;
                        }
                        game.chickens.splice(i, 1);
                        continue;
                    }
                    if (rectCollide(game.player, c) && game.player.invincible === 0) {
                        triggerDeathAnimation();
                        game.chickens.splice(i, 1);
                        if (game.dying) return;
                    }
                }

                // Boss collision with player
                if (game.boss && game.boss.entered && !game.bossDefeated && rectCollide(game.player, game.boss) && game
                    .player.invincible === 0) {
                    triggerDeathAnimation();
                    if (game.dying) return;
                }

                // ── Powerups ──
                for (let i = game.powerups.length - 1; i >= 0; i--) {
                    const p = game.powerups[i];
                    p.y += p.speed;
                    p.bob += 0.05;
                    if (p.y > H) { game.powerups.splice(i, 1); continue; }
                    if (rectCollide(game.player, p)) {
                        applyPowerup(p.type);
                        spawnParticles(p.x + p.w / 2, p.y + p.h / 2, '#ffffff', 18);
                        game.powerups.splice(i, 1);
                        continue;
                    }
                }

                // ── Particles ──
                for (let i = game.particles.length - 1; i >= 0; i--) {
                    const pt = game.particles[i];
                    pt.x += pt.vx;
                    pt.y += pt.vy;
                    pt.vy += 0.05;
                    pt.life--;
                    if (pt.life <= 0) { game.particles.splice(i, 1); }
                }

                if (game.screenShake > 0) game.screenShake *= 0.92;
                if (game.screenShake < 0.05) game.screenShake = 0;

                for (const star of game.starField) {
                    star.y += star.speed;
                    if (star.y > H) { star.y = 0;
                        star.x = Math.random() * W; }
                }

                if (game.player.lives <= 0 && !game.dying) {
                    game.gameOver = true;
                    appState = 'gameover';
                    playSound('gameover');
                    game.totalGames++;
                    if (game.score > game.highScore) {
                        game.highScore = game.score;
                        showToast('🏆 NEW HIGH SCORE: ' + game.highScore + '!');
                    }
                    if (game.level > game.highestLevel) { game.highestLevel = game.level; }
                    saveData();
                    checkAchievements();
                }
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── DRAW ───────────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            function drawBackground() {
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#0a0a18');
                grad.addColorStop(0.5, '#0d1025');
                grad.addColorStop(1, '#0a0a18');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);
                // Stars
                ctx.fillStyle = '#fff';
                for (const star of game.starField) {
                    const bright = 0.3 + 0.7 * (star.s / 2);
                    ctx.globalAlpha = bright;
                    ctx.fillRect(star.x, star.y, star.s, star.s);
                }
                ctx.globalAlpha = 1;
            }

            function drawGame() {
                ctx.save();
                if (game.screenShake > 0.5) {
                    const sx = (Math.random() - 0.5) * game.screenShake * 2;
                    const sy = (Math.random() - 0.5) * game.screenShake * 2;
                    ctx.translate(sx, sy);
                }

                drawBackground();

                // Particles
                for (const pt of game.particles) {
                    const alpha = pt.life / pt.maxLife;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = pt.color;
                    ctx.fillRect(pt.x - pt.size / 2, pt.y - pt.size / 2, pt.size, pt.size);
                }
                ctx.globalAlpha = 1;

                for (const pt of game.deathParticles) {
                    const alpha = pt.life / pt.maxLife;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = pt.color;
                    const size = pt.size * (0.5 + 0.5 * (pt.life / pt.maxLife));
                    ctx.fillRect(pt.x - size / 2, pt.y - size / 2, size, size);
                }
                ctx.globalAlpha = 1;

                // Chickens
                for (const c of game.chickens) {
                    if (c.hitFlash > 0 && c.hitFlash % 4 < 2) ctx.globalAlpha = 0.6;
                    ctx.drawImage(c.sprite, c.x, c.y, c.w, c.h);
                    ctx.globalAlpha = 1;
                    if (c.maxHp > 1) {
                        const bw = c.w,
                            bh = 4,
                            bx = c.x,
                            by = c.y - 6;
                        ctx.fillStyle = 'rgba(0,0,0,0.6)';
                        ctx.fillRect(bx, by, bw, bh);
                        ctx.fillStyle = c.hp / c.maxHp > 0.5 ? '#66dd88' : '#ff8844';
                        ctx.fillRect(bx, by, bw * (c.hp / c.maxHp), bh);
                    }
                }

                // Boss
                if (game.boss && game.bossActive && !game.bossDefeated) {
                    const b = game.boss;
                    if (b.hitFlash > 0 && b.hitFlash % 4 < 2) ctx.globalAlpha = 0.6;
                    const grad2 = ctx.createRadialGradient(b.x + b.w / 2, b.y + b.h / 2, 5, b.x + b.w / 2, b.y + b.h / 2,
                    60);
                    grad2.addColorStop(0, 'rgba(255,50,80,0.15)');
                    grad2.addColorStop(1, 'rgba(255,50,80,0)');
                    ctx.fillStyle = grad2;
                    ctx.fillRect(b.x - 40, b.y - 40, b.w + 80, b.h + 80);
                    ctx.drawImage(bossSprite, b.x, b.y, b.w, b.h);
                    ctx.globalAlpha = 1;
                    const barW = 140,
                        barH = 10,
                        bx = W / 2 - barW / 2,
                        by = 14;
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(bx - 2, by - 2, barW + 4, barH + 4);
                    const ratio = b.health / b.maxHealth;
                    const hue = 120 * ratio;
                    ctx.fillStyle = `hsl(${hue}, 90%, 55%)`;
                    ctx.fillRect(bx, by, barW * Math.max(0, ratio), barH);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(bx - 2, by - 2, barW + 4, barH + 4);
                    ctx.fillStyle = '#ff6699';
                    ctx.font = '10px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(`👑 BOSS Lv.${game.level} [${game.bossPhase === 2 ? '💀' : game.bossPhase === 1 ? '⚡' : '🔰'}]`,
                        W / 2, by - 4);
                    ctx.textAlign = 'left';
                }

                // Player ship
                const px = game.player.x,
                    py = game.player.y;
                if (!game.dying) {
                    const flameLen = 8 + Math.sin(game.frame * 0.3) * 3;
                    ctx.fillStyle = '#ff8844';
                    ctx.shadowColor = '#ff8844';
                    ctx.shadowBlur = 15;
                    ctx.fillRect(px + 10, py + game.player.h, 4, flameLen);
                    ctx.fillStyle = '#ffaa44';
                    ctx.shadowBlur = 8;
                    ctx.fillRect(px + 11, py + game.player.h + 2, 2, flameLen - 2);
                    ctx.fillStyle = '#ff8844';
                    ctx.shadowBlur = 15;
                    ctx.fillRect(px + 22, py + game.player.h, 4, flameLen);
                    ctx.fillStyle = '#ffaa44';
                    ctx.shadowBlur = 8;
                    ctx.fillRect(px + 23, py + game.player.h + 2, 2, flameLen - 2);
                    ctx.shadowBlur = 0;
                }

                const shipId = game.selectedShip;
                if (game.player.invincible > 0 && Math.floor(game.frame / 6) % 2 === 0 && !game.dying) ctx.globalAlpha =
                    0.5;
                if (game.dying) ctx.globalAlpha = 1 - (game.deathTimer / 30);
                ctx.drawImage(shipSprites[shipId], px, py, game.player.w, game.player.h);
                ctx.globalAlpha = 1;

                if (!game.dying) {
                    ctx.shadowColor = '#66ddff';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = 'rgba(102, 221, 255, 0.3)';
                    ctx.fillRect(px + 14, py + 5, 8, 4);
                    ctx.shadowBlur = 0;
                }

                if (game.player.shield && !game.dying) {
                    ctx.strokeStyle = '#44ddff';
                    ctx.lineWidth = 2;
                    ctx.shadowColor = '#44ddff';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(px + game.player.w / 2, py + game.player.h / 2, game.player.w / 2 + 4, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                if (!game.dying) {
                    if (game.player.hasRapid) {
                        ctx.fillStyle = '#ffaa44';
                        ctx.font = '10px "Courier New", monospace';
                        ctx.fillText('⚡', px - 4, py + game.player.h + 16);
                    }
                    if (game.player.hasMulti) {
                        ctx.fillStyle = '#ff66ff';
                        ctx.font = '10px "Courier New", monospace';
                        ctx.fillText('✧', px + game.player.w - 2, py + game.player.h + 16);
                    }
                }

                // Bullets
                for (const b of game.bullets) ctx.drawImage(bulletSprite, b.x, b.y, b.w, b.h);
                for (const eb of game.enemyBullets) {
                    ctx.fillStyle = '#66ff66';
                    ctx.shadowColor = '#66ff66';
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(eb.x + eb.w / 2, eb.y + eb.h / 2, eb.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                for (const bb of game.bossBullets) {
                    ctx.fillStyle = '#ff4466';
                    ctx.shadowColor = '#ff4466';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(bb.x + bb.w / 2, bb.y + bb.h / 2, bb.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                for (const p of game.powerups) {
                    const bobY = Math.sin(p.bob) * 2;
                    ctx.drawImage(p.sprite, p.x, p.y + bobY, p.w, p.h);
                }

                // HUD
                ctx.fillStyle = '#c0d8e8';
                ctx.font = '13px "Courier New", monospace';
                ctx.fillText(`Score: ${game.score}`, 8, 24);
                ctx.fillText(`Lv:${game.level}`, 8, 44);
                ctx.fillText(`St:${game.stage}/${STAGES_PER_LEVEL}`, 8, 64);
                for (let i = 0; i < game.player.lives; i++) {
                    ctx.fillStyle = '#ff4466';
                    ctx.fillText('❤️', 130 + i * 22, 26);
                }
                ctx.fillStyle = '#ffdd44';
                ctx.font = '13px "Courier New", monospace';
                ctx.fillText('🪙 ' + game.coins, 190, 44);

                let hudX = 230;
                if (game.player.shield) { ctx.fillStyle = '#44ddff';
                    ctx.font = '14px "Courier New", monospace';
                    ctx.fillText('🛡', hudX, 24);
                    hudX += 20; }
                if (game.player.hasRapid) { ctx.fillStyle = '#ffaa44';
                    ctx.fillText('⚡', hudX, 24);
                    hudX += 20; }
                if (game.player.hasMulti) { ctx.fillStyle = '#ff66ff';
                    ctx.fillText('✧', hudX, 24); }

                if (game.combo > 1) {
                    ctx.fillStyle = '#ffdd44';
                    ctx.font = 'bold 15px "Courier New", monospace';
                    ctx.shadowColor = '#ffdd44';
                    ctx.shadowBlur = 15;
                    ctx.fillText(`🔥 x${game.combo}`, 8, 88);
                    ctx.shadowBlur = 0;
                }

                if (game.waveActive && !game.bossActive) {
                    const total = game.chickensInWave;
                    const done = game.chickensSpawnedInWave - game.chickens.length;
                    const pct = Math.min(1, done / total);
                    ctx.fillStyle = 'rgba(255,255,255,0.12)';
                    ctx.fillRect(100, 48, 80, 8);
                    ctx.fillStyle = '#66ccff';
                    ctx.fillRect(100, 48, 80 * pct, 8);
                    ctx.fillStyle = '#8899aa';
                    ctx.font = '9px "Courier New", monospace';
                    ctx.fillText(`${Math.floor(pct*100)}%`, 186, 56);
                }

                if (game.bossIntro > 0) {
                    ctx.fillStyle = '#ff3366';
                    ctx.font = 'bold 30px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    const pulse = Math.sin(game.bossIntro * 0.1) * 0.3 + 0.7;
                    ctx.globalAlpha = pulse;
                    ctx.shadowColor = '#ff3366';
                    ctx.shadowBlur = 30;
                    ctx.fillText('⚔ BOSS ⚔', W / 2, H / 2 - 20);
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                    ctx.textAlign = 'left';
                }

                if (game.showLevelUp) {
                    ctx.fillStyle = '#ffdd44';
                    ctx.font = 'bold 36px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = '#ffdd44';
                    ctx.shadowBlur = 40;
                    const progress = 1 - (game.levelUpTimer / 120);
                    const scale = 1 + Math.sin(progress * Math.PI) * 0.3;
                    ctx.setTransform(1, 0, 0, 1, W / 2, H / 2);
                    ctx.scale(scale, scale);
                    ctx.fillText('⭐ LEVEL ' + game.level + '! ⭐', 0, 0);
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                    ctx.shadowBlur = 0;
                    ctx.textAlign = 'left';
                }

                if (!game.touchShoot && !game.gameOver && game.frame < 180 && !game.dying) {
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.font = '11px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('👆 Touch to move & shoot', W / 2, H - 20);
                    ctx.textAlign = 'left';
                }

                if (game.dying && game.deathTimer < 20) {
                    const flashAlpha = (20 - game.deathTimer) / 20 * 0.5;
                    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
                    ctx.fillRect(0, 0, W, H);
                }

                ctx.restore();
            }

            // ─── MENU DRAW ──────────────────────────────────────────

            function drawMenuBackground() {
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#0a0a18');
                grad.addColorStop(0.5, '#0d1025');
                grad.addColorStop(1, '#0a0a18');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);
                for (let i = 0; i < 40; i++) {
                    const sx = (i * 137 + i * i * 5 + 7) % W;
                    const sy = (i * 79 + i * i * 9 + 13 + menuTime * 0.1) % H;
                    const size = 1 + (i % 3);

            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                    if (r > w / 2) r = w / 2;
                    if (r > h / 2) r = h / 2;
                    this.moveTo(x + r, y);
                    this.lineTo(x + w - r, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + r);
                    this.lineTo(x + w, y + h - r);
                    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                    this.lineTo(x + r, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - r);
                    this.lineTo(x, y + r);
                    this.quadraticCurveTo(x, y, x + r, y);
                    return this;
                };
            }

            function handleCanvasClick(e) {
                e.preventDefault();
                const pos = getCanvasCoords(e);

                if (appState === 'menu') {
                    if (pos.x > W - 50 && pos.y < 45) {
                        options.music = !options.music;
                        return;
                    }
                    if (currentMenu === 'main') {
                        for (let i = 0; i < menuItems.length; i++) {
                            const item = menuItems[i];
                            const bw = 230,
                                bh = 44,
                                bx = W / 2 - bw / 2,
                                by = item.y - bh / 2;
                            if (pos.x >= bx && pos.x <= bx + bw && pos.y >= by && pos.y <= by + bh) {
                                menuSelected = i;
                                handleMenuAction(item.id);
                                return;
                            }
                        }
                    } else {
                        if (pos.x >= 30 && pos.x <= 150 && pos.y >= 698 && pos.y <= 734) {
                            currentMenu = 'main';
                            menuItems = mainMenuItems;
                            menuSelected = 0;
                            return;
                        }
                        if (currentMenu === 'shop') handleShopClick(pos);
                        if (currentMenu === 'options') handleOptionsClick(pos);
                    }
                } else if (appState === 'playing') {
                    if (game.dying) return;
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    let cx = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                    cx = cx * scaleX;
                    if (e.touches) { cx = (e.touches[0].clientX - rect.left) * scaleX; }
                    game.player.x = Math.max(0, Math.min(W - game.player.w, cx - game.player.w / 2));
                    game.touchShoot = true;
                } else if (appState === 'gameover') {
                    const pos2 = getCanvasCoords(e);
                    const bw = 80,
                        bh = 40,
                        spacing = 20,
                        totalWidth = bw * 2 + spacing,
                        startX = W / 2 - totalWidth / 2,
                        btnY = H / 2 + 80;
                    if (pos2.x >= startX && pos2.x <= startX + bw && pos2.y >= btnY && pos2.y <= btnY + bh) startGame();
                    else if (pos2.x >= startX + bw + spacing && pos2.x <= startX + bw + spacing + bw && pos2.y >= btnY &&
                        pos2.y <= btnY + bh) {
                        appState = 'menu';
                        currentMenu = 'main';
                        menuItems = mainMenuItems;
                        menuSelected = 0;
                    }
                }
            }

            function handleMenuAction(id) {
                menuFlash = 8;
                switch (id) {
                    case 'play':
                        startGame();
                        break;
                    case 'shop':
                        currentMenu = 'shop';
                        menuItems = [];
                        break;
                    case 'achievements':
                        currentMenu = 'achievements';
                        menuItems = [];
                        break;
                    case 'stats':
                        currentMenu = 'stats';
                        menuItems = [];
                        break;
                    case 'options':
                        currentMenu = 'options';
                        menuItems = [];
                        break;
                }
            }

            function handleShopClick(pos) {
                const startY = 310;
                for (let i = 0; i < SHIPS.length; i++) {
                    const y = startY + i * 72;
                    if (pos.x >= 30 && pos.x <= W - 30 && pos.y >= y && pos.y <= y + 60) {
                        const ship = SHIPS[i];
                        if (game.unlockedShips.includes(ship.id)) {
                            if (game.selectedShip !== ship.id) {
                                game.selectedShip = ship.id;
                                saveData();
                                showToast('🛸 ' + ship.name + ' equipped!');
                            }
                        } else {
                            if (game.coins >= ship.price) {
                                game.coins -= ship.price;
                                game.unlockedShips.push(ship.id);
                                game.selectedShip = ship.id;
                                saveData();
                                showToast('🚀 ' + ship.name + ' unlocked!');
                                playSound('levelup');
                            } else {
                                showToast('❌ Not enough coins! Need ' + ship.price);
                            }
                        }
                        return;
                    }
                }
                const upgrades = [
                    { key: 'speed', cost: 50 + game.upgrades.speed * 30, label: '🚀 SPEED' },
                    { key: 'fireRate', cost: 60 + game.upgrades.fireRate * 35, label: '⚡ FIRE RATE' },
                    { key: 'damage', cost: 70 + game.upgrades.damage * 40, label: '💥 DAMAGE' },
                    { key: 'shield', cost: 80 + game.upgrades.shield * 45, label: '🛡 SHIELD' },
                ];
                for (let i = 0; i < upgrades.length; i++) {
                    const u = upgrades[i];
                    const y = 670 + i * 28;
                    if (pos.x >= W - 80 && pos.x <= W - 20 && pos.y >= y - 12 && pos.y <= y + 12) {
                        const level = game.upgrades[u.key] || 0;
                        if (level < 10 && game.coins >= u.cost) {
                            game.coins -= u.cost;
                            game.upgrades[u.key] = (game.upgrades[u.key] || 0) + 1;
                            saveData();
                            showToast('⬆ ' + u.label + ' upgraded to Lv.' + game.upgrades[u.key] + '!');
                            playSound('powerup');
                        } else if (level >= 10) { showToast('⭐ MAX LEVEL!'); } else { showToast('❌ Not enough coins! Need ' +
                                u.cost); }
                        return;
                    }
                }
            }

            function handleOptionsClick(pos) {
                const opts = [
                    { key: 'sound', y: 300 },
                    { key: 'music', y: 350 },
                    { key: 'vibration', y: 400 },
                    { key: 'difficulty', y: 450 },
                ];
                for (const o of opts) {
                    if (pos.x >= 60 && pos.x <= W - 60 && pos.y >= o.y - 20 && pos.y <= o.y + 20) {
                        switch (o.key) {
                            case 'sound':
                                options.sound = !options.sound;
                                if (options.sound) playSound('shoot');
                                break;
                            case 'music':
                                options.music = !options.music;
                                break;
                            case 'vibration':
                                options.vibration = !options.vibration;
                                if (options.vibration && navigator.vibrate) navigator.vibrate(50);
                                break;
                            case 'difficulty':
                                const diffs = ['easy', 'normal', 'hard'];
                                const idx = diffs.indexOf(options.difficulty);
                                options.difficulty = diffs[(idx + 1) % diffs.length];
                                showToast('🎯 Difficulty: ' + options.difficulty.toUpperCase());
                                break;
                        }
                        saveData();
                        return;
                    }
                }
            }

            // ─── Touch / Mouse events ──────────────────────────────

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (appState === 'menu' || appState === 'gameover') { handleCanvasClick(e); return; }
                if (appState === 'playing') {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const touch = e.touches[0];
                    const canvasX = (touch.clientX - rect.left) * scaleX;
                    game.player.x = Math.max(0, Math.min(W - game.player.w, canvasX - game.player.w / 2));
                    game.touchShoot = true;
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (appState !== 'playing' || game.dying) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const touch = e.touches[0];
                const canvasX = (touch.clientX - rect.left) * scaleX;
                game.player.x = Math.max(0, Math.min(W - game.player.w, canvasX - game.player.w / 2));
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => { e.preventDefault();
                game.touchShoot = false; }, { passive: false });

            canvas.addEventListener('click', handleCanvasClick);

            canvas.addEventListener('mousemove', (e) => {
                if (appState === 'menu') {
                    const pos = getCanvasCoords(e);
                    menuHover = -1;
                    if (currentMenu === 'main') {
                        for (let i = 0; i < menuItems.length; i++) {
                            const item = menuItems[i];
                            const bw = 230,
                                bh = 44,
                                bx = W / 2 - bw / 2,
                                by = item.y - bh / 2;
                            if (pos.x >= bx && pos.x <= bx + bw && pos.y >= by && pos.y <= by + bh) { menuHover =
                                i; break; }
                        }
                    }
                }
                if (appState === 'playing' && game.mouseDown && !game.dying) {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const canvasX = (e.clientX - rect.left) * scaleX;
                    game.player.x = Math.max(0, Math.min(W - game.player.w, canvasX - game.player.w / 2));
                }
            });

            canvas.addEventListener('mousedown', (e) => {
                if (appState === 'playing' && !game.dying) {
                    game.mouseDown = true;
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const canvasX = (e.clientX - rect.left) * scaleX;
                    game.player.x = Math.max(0, Math.min(W - game.player.w, canvasX - game.player.w / 2));
                    game.shootCooldown = 0;
                }
            });
            canvas.addEventListener('mouseup', () => { game.mouseDown = false; });
            canvas.addEventListener('mouseleave', () => { game.mouseDown = false; });

            // ─── Keyboard ──────────────────────────────────────────────

            document.addEventListener('keydown', (e) => {
                const k = e.key;
                if (appState === 'menu') {
                    if (currentMenu === 'main') {
                        if (k === 'ArrowDown' || k === 's') { e.preventDefault();
                            menuSelected = (menuSelected + 1) % menuItems.length; }
                        if (k === 'ArrowUp' || k === 'w') { e.preventDefault();
                            menuSelected = (menuSelected - 1 + menuItems.length) % menuItems.length; }
                        if (k === 'Enter' || k === ' ') { e.preventDefault();
                            handleMenuAction(menuItems[menuSelected].id); }
                    }
                    if (k === 'm' || k === 'M') { options.music = !options.music;
                        saveData(); }
                    if (k === 'Escape' && currentMenu !== 'main') {
                        currentMenu = 'main';
                        menuItems = mainMenuItems;
                        menuSelected = 0;
                    }
                    return;
                }
                if (appState === 'gameover') {
                    if (k === 'r' || k === 'R') startGame();
                    if (k === 'm' || k === 'M') {
                        appState = 'menu';
                        currentMenu = 'main';
                        menuItems = mainMenuItems;
                        menuSelected = 0;
                    }
                    return;
                }
                if (appState === 'playing') {
                    if (game.dying) return;
                    if (k === 'ArrowLeft' || k === 'a') keys.left = true;
                    if (k === 'ArrowRight' || k === 'd') keys.right = true;
                    if (k === ' ') { e.preventDefault(); if (!keys.space) { keys.space = true;
                            spacePressed = true; } }
                    if (k === 'm' || k === 'M') { options.music = !options.music;
                        saveData(); }
                }
            });

            document.addEventListener('keyup', (e) => {
                const k = e.key;
                if (appState === 'playing') {
                    if (k === 'ArrowLeft' || k === 'a') keys.left = false;
                    if (k === 'ArrowRight' || k === 'd') keys.right = false;
                    if (k === ' ') { e.preventDefault();
                        keys.space = false; }
                }
            });

            // ─── ─────────────────────────────────────────────────────
            // ─── MAIN LOOP ──────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            function loop() {
                if (appState === 'menu') drawMenu();
                else if (appState === 'playing') {
                    updateGame();
                    if (appState === 'gameover') drawGameOver();
                    else drawGame();
                } else if (appState === 'gameover') drawGameOver();
                requestAnimationFrame(loop);
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── START ──────────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            loadData();
            appState = 'menu';
            currentMenu = 'main';
            menuItems = mainMenuItems;
            menuSelected = 0;

            setTimeout(() => {
                const shipCount = game.unlockedShips.length;
                const achCount = game.achievements.length;
                showToast('🐔 Welcome back! ' + shipCount + ' ships, ' + achCount + ' achievements!', 2000);
            }, 500);

            loop();

            console.log('🐔 CHICKEN INVADERS – FIXED!');
            console.log('✅ Level progression bug fixed – no more auto-complete!');

        })();
    </script>
</body>
</html>
