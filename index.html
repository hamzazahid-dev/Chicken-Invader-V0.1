<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🐔 CHICKEN INVADERS 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        body {
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            touch-action: none;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            position: relative;
            z-index: 1;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            font-family: 'Courier New', monospace;
            z-index: 10;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #c0d8e8;
            font-size: 16px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: 10;
        }
        #hud div {
            margin: 4px 0;
        }
        #hud .score {
            color: #ffdd44;
            font-size: 20px;
            font-weight: bold;
        }
        #hud .lives {
            color: #ff4466;
        }
        #hud .combo {
            color: #ffdd44;
            font-size: 18px;
            text-shadow: 0 0 30px #ffdd44;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #hud .combo.active {
            opacity: 1;
        }
        #hud .coins {
            color: #ffdd44;
        }
        #hud .level {
            color: #66ddff;
        }

        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 20;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        #menu.hidden {
            display: none;
        }
        #menu h1 {
            font-size: 48px;
            color: #ff8844;
            text-shadow: 0 0 40px rgba(255, 136, 68, 0.3);
            margin-bottom: 4px;
            pointer-events: none;
        }
        #menu h1 span {
            color: #66ddff;
        }
        #menu .subtitle {
            font-size: 18px;
            color: #aabbcc;
            margin-bottom: 30px;
            pointer-events: none;
        }
        #menu .btn {
            pointer-events: auto;
            padding: 14px 50px;
            margin: 6px 0;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            background: rgba(20, 30, 50, 0.7);
            border: 1px solid rgba(100, 150, 200, 0.3);
            color: #8899bb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 250px;
            text-align: center;
            min-width: 200px;
            touch-action: manipulation;
        }
        #menu .btn:hover,
        #menu .btn.selected {
            background: rgba(40, 80, 140, 0.7);
            border-color: #66ddff;
            color: #ffffff;
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.1);
        }
        #menu .btn:active {
            transform: scale(0.95);
        }
        #menu .btn .sub {
            font-size: 11px;
            color: #667788;
        }
        #menu .stats {
            color: #667788;
            font-size: 13px;
            margin-top: 20px;
            text-align: center;
            line-height: 1.6;
            pointer-events: none;
        }
        #menu .stats span {
            color: #ffdd44;
        }

        #gameover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        #gameover.show {
            display: flex;
        }
        #gameover h1 {
            font-size: 48px;
            color: #ff4466;
            text-shadow: 0 0 40px rgba(255, 68, 102, 0.3);
            margin-bottom: 10px;
            pointer-events: none;
        }
        #gameover .final-score {
            font-size: 22px;
            color: #ddd;
            margin: 6px 0;
            pointer-events: none;
        }
        #gameover .final-stats {
            font-size: 16px;
            color: #8899aa;
            margin: 6px 0;
            pointer-events: none;
        }
        #gameover .btn {
            pointer-events: auto;
            padding: 14px 50px;
            margin: 6px 0;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            background: rgba(40, 70, 120, 0.8);
            border: 2px solid #66ddff;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 200px;
            text-align: center;
            touch-action: manipulation;
        }
        #gameover .btn:hover {
            background: rgba(60, 100, 180, 0.9);
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.2);
        }
        #gameover .btn.secondary {
            background: rgba(30, 30, 50, 0.8);
            border-color: #8899bb;
            color: #ccc;
        }
        #gameover .btn.secondary:hover {
            background: rgba(50, 50, 80, 0.9);
        }

        #toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #ffdd44;
            padding: 10px 24px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            border: 1px solid #ffdd44;
            box-shadow: 0 0 30px rgba(255, 220, 68, 0.2);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            text-align: center;
            max-width: 90%;
        }
        #toast.show {
            opacity: 1;
        }

        @media (max-width: 600px) {
            #menu h1 {
                font-size: 32px;
            }
            #menu .btn {
                width: 200px;
                font-size: 16px;
                padding: 12px 30px;
            }
            #hud {
                font-size: 13px;
                top: 10px;
                left: 10px;
            }
            #gameover h1 {
                font-size: 32px;
            }
            #gameover .final-score {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="hud">
            <div class="score">🏆 <span id="scoreDisplay">0</span></div>
            <div class="lives">❤️ <span id="livesDisplay">3</span></div>
            <div class="coins">🪙 <span id="coinsDisplay">0</span></div>
            <div class="level">📊 Level <span id="levelDisplay">1</span></div>
            <div class="combo" id="comboDisplay">🔥 x0</div>
        </div>

        <div id="menu">
            <h1>CHICKEN <span>INVADERS</span></h1>
            <div class="subtitle">⚡ THE NEXT WAVE ⚡</div>
            <div class="btn" id="playBtn">🚀 PLAY</div>
            <div class="btn" id="shopBtn">🛒 SHOP</div>
            <div class="btn" id="statsBtn">📊 STATS</div>
            <div class="stats">
                <div>Ships: <span id="menuShips">1</span>/5 &nbsp;•&nbsp; Achievements: <span id="menuAch">0</span>/12</div>
                <div>🪙 <span id="menuCoins">0</span> coins &nbsp;•&nbsp; Best Level: <span id="menuLevel">1</span></div>
            </div>
            <div style="margin-top:10px;font-size:11px;color:#445566;pointer-events:none;">⌨️ WASD / Arrow Keys to move • Space to shoot</div>
        </div>

        <div id="gameover">
            <h1>💀 GAME OVER</h1>
            <div class="final-score">Score: <span id="finalScore">0</span></div>
            <div class="final-stats">Level: <span id="finalLevel">1</span> &nbsp;•&nbsp; Max Combo: x<span id="finalCombo">0</span></div>
            <div class="final-stats">🪙 <span id="finalCoins">0</span> coins</div>
            <div class="btn" id="retryBtn">🔄 RETRY</div>
            <div class="btn secondary" id="menuBtn">🏠 MENU</div>
        </div>
    </div>
    <div id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script>
        (function() {
            'use strict';

            // ─── Toast ──────────────────────────────────────────────
            let toastTimeout = null;

            function showToast(msg, duration = 2500) {
                const el = document.getElementById('toast');
                el.textContent = msg;
                el.classList.add('show');
                if (toastTimeout) clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => { el.classList.remove('show'); }, duration);
            }

            // ─── DOM refs ────────────────────────────────────────────
            const menuEl = document.getElementById('menu');
            const gameoverEl = document.getElementById('gameover');
            const playBtn = document.getElementById('playBtn');
            const shopBtn = document.getElementById('shopBtn');
            const statsBtn = document.getElementById('statsBtn');
            const retryBtn = document.getElementById('retryBtn');
            const menuBtn = document.getElementById('menuBtn');

            // ─── ─────────────────────────────────────────────────────
            // ─── THREE.JS SETUP ─────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a18);
            scene.fog = new THREE.Fog(0x0a0a18, 30, 60);

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 10, 12);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.prepend(renderer.domElement);

            // ─── Lights ──────────────────────────────────────────────
            const ambientLight = new THREE.AmbientLight(0x223355, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(10, 20, 5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 50;
            dirLight.shadow.camera.left = -20;
            dirLight.shadow.camera.right = 20;
            dirLight.shadow.camera.top = 20;
            dirLight.shadow.camera.bottom = -20;
            scene.add(dirLight);

            const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
            fillLight.position.set(-10, 5, -10);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xff8844, 0.2);
            rimLight.position.set(-5, 0, 10);
            scene.add(rimLight);

            // ─── Stars ────────────────────────────────────────────────────
            const starsGeometry = new THREE.BufferGeometry();
            const starCount = 2000;
            const starPositions = new Float32Array(starCount * 3);
            const starColors = new Float32Array(starCount * 3);
            const starSizes = new Float32Array(starCount);
            for (let i = 0; i < starCount; i++) {
                starPositions[i * 3] = (Math.random() - 0.5) * 200;
                starPositions[i * 3 + 1] = (Math.random() - 0.5) * 100 + 20;
                starPositions[i * 3 + 2] = (Math.random() - 0.5) * 200 - 50;
                const bright = 0.3 + Math.random() * 0.7;
                const tint = Math.random();
                if (tint < 0.33) { starColors[i * 3] = bright;
                    starColors[i * 3 + 1] = bright * 0.9;
                    starColors[i * 3 + 2] = bright * 0.7; } else if (tint < 0.66) { starColors[i * 3] = bright * 0.8;
                    starColors[i * 3 + 1] = bright * 0.9;
                    starColors[i * 3 + 2] = bright; } else { starColors[i * 3] = bright;
                    starColors[i * 3 + 1] = bright;
                    starColors[i * 3 + 2] = bright; }
                starSizes[i] = 0.5 + Math.random() * 2;
            }
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starsGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            starsGeometry.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

            const starMaterial = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                sizeAttenuation: true,
            });
            const stars = new THREE.Points(starsGeometry, starMaterial);
            scene.add(stars);

            // ─── Ground ─────────────────────────────────────────────
            const gridHelper = new THREE.GridHelper(30, 20, 0x334466, 0x223355);
            gridHelper.position.y = -0.5;
            scene.add(gridHelper);

            const groundGeo = new THREE.PlaneGeometry(40, 30);
            const groundMat = new THREE.MeshStandardMaterial({
                color: 0x0d1025,
                transparent: true,
                opacity: 0.6,
                roughness: 0.8,
                metalness: 0.2,
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);

            // ─── ─────────────────────────────────────────────────────
            // ─── GAME STATE ─────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            const game = {
                coins: 0,
                level: 1,
                highScore: 0,
                unlockedShips: [0],
                selectedShip: 0,
                upgrades: { speed: 0, fireRate: 0, damage: 0, shield: 0 },
                achievements: [],
                totalKills: 0,
                totalGames: 0,
                highestLevel: 0,
                maxCombo: 0,
                // Runtime
                score: 0,
                combo: 0,
                comboTimeout: 0,
                lives: 3,
                stage: 1,
                waveActive: false,
                bossActive: false,
                bossDefeated: false,
                gameOver: false,
                levelComplete: false,
                frame: 0,
                spawnTimer: 0,
                bossIntro: 0,
                chickens: [],
                bullets: [],
                enemyBullets: [],
                powerups: [],
                particles: [],
                boss: null,
                shootCooldown: 0,
                dying: false,
                deathTimer: 0,
                screenShake: 0,
                playerSpeed: 0.15,
                playerX: 0,
                touchX: null,
                touchActive: false,
                mouseDown: false,
                shipMeshes: [],
                chickenMeshes: [],
                // Keyboard movement
                keys: { left: false, right: false },
            };

            const options = {
                sound: true,
                music: false,
                vibration: true,
                difficulty: 'normal',
            };

            const SHIPS = [
                { id: 0, name: 'PHOENIX', price: 0, speed: 1, fireRate: 1, damage: 1, shield: 1 },
                { id: 1, name: 'RAVEN', price: 200, speed: 1.2, fireRate: 0.8, damage: 1.2, shield: 1 },
                { id: 2, name: 'TITAN', price: 500, speed: 0.8, fireRate: 1.2, damage: 1.5, shield: 2 },
                { id: 3, name: 'STRIKE', price: 1000, speed: 1.5, fireRate: 1.5, damage: 1, shield: 1 },
                { id: 4, name: 'VOID', price: 2000, speed: 1.3, fireRate: 1.3, damage: 1.3, shield: 1.5 },
            ];

            const ACHIEVEMENTS = [
                { id: 'first_kill', name: 'First Blood', desc: 'Kill your first chicken', icon: '💀', check: () => game
                        .totalKills >= 1 },
                { id: 'kill_10', name: 'Chicken Hunter', desc: 'Kill 10 chickens', icon: '🔫', check: () => game
                        .totalKills >= 10 },
                { id: 'kill_100', name: 'Massacre', desc: 'Kill 100 chickens', icon: '💥', check: () => game
                        .totalKills >= 100 },
                { id: 'kill_500', name: 'Legendary Slayer', desc: 'Kill 500 chickens', icon: '🏆', check: () => game
                        .totalKills >= 500 },
                { id: 'level_5', name: 'Warrior', desc: 'Reach level 5', icon: '⚔️', check: () => game.highestLevel >=
                    5 },
                { id: 'level_10', name: 'Champion', desc: 'Reach level 10', icon: '👑', check: () => game
                        .highestLevel >= 10 },
                { id: 'level_20', name: 'Legend', desc: 'Reach level 20', icon: '⭐', check: () => game.highestLevel >=
                    20 },
                { id: 'combo_10', name: 'Combo Master', desc: 'Get a 10x combo', icon: '🔥', check: () => game
                        .maxCombo >= 10 },
                { id: 'combo_25', name: 'Combo God', desc: 'Get a 25x combo', icon: '💫', check: () => game
                        .maxCombo >= 25 },
                { id: 'score_1000', name: 'Centurion', desc: 'Score 1000 points', icon: '💰', check: () => game
                        .highScore >= 1000 },
                { id: 'score_5000', name: 'Millionaire', desc: 'Score 5000 points', icon: '💎', check: () => game
                        .highScore >= 5000 },
                { id: 'ship_collector', name: 'Collector', desc: 'Unlock 3 ships', icon: '🚀', check: () => game
                        .unlockedShips.length >= 3 },
            ];

            // ─── ─────────────────────────────────────────────────────
            // ─── 3D MODEL BUILDERS ──────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            function createShipMesh(shipId) {
                const group = new THREE.Group();
                const colors = [0x66ddff, 0xff66aa, 0xffaa44, 0x44ff88, 0xaa66ff];
                const color = colors[shipId] || 0x66ddff;

                const hullGeo = new THREE.BoxGeometry(0.8, 0.3, 1.2);
                const hullMat = new THREE.MeshStandardMaterial({
                    color: color,
                    metalness: 0.7,
                    roughness: 0.3,
                    emissive: color,
                    emissiveIntensity: 0.1,
                });
                const hull = new THREE.Mesh(hullGeo, hullMat);
                hull.position.z = -0.1;
                hull.castShadow = true;
                group.add(hull);

                const cockpitGeo = new THREE.SphereGeometry(0.25, 8, 8);
                const cockpitMat = new THREE.MeshStandardMaterial({
                    color: 0x66ddff,
                    metalness: 0.2,
                    roughness: 0.1,
                    emissive: 0x66ddff,
                    emissiveIntensity: 0.2,
                    transparent: true,
                    opacity: 0.8,
                });
                const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
                cockpit.position.set(0, 0.2, 0.25);
                cockpit.scale.set(0.8, 0.6, 0.6);
                group.add(cockpit);

                const wingMat = new THREE.MeshStandardMaterial({
                    color: color,
                    metalness: 0.5,
                    roughness: 0.4,
                });
                const wingGeo = new THREE.BoxGeometry(0.7, 0.08, 0.5);
                const wingL = new THREE.Mesh(wingGeo, wingMat);
                wingL.position.set(-0.6, 0, 0);
                wingL.rotation.z = -0.2;
                wingL.castShadow = true;
                group.add(wingL);
                const wingR = new THREE.Mesh(wingGeo, wingMat);
                wingR.position.set(0.6, 0, 0);
                wingR.rotation.z = 0.2;
                wingR.castShadow = true;
                group.add(wingR);

                const engineMat = new THREE.MeshStandardMaterial({
                    color: 0xff8844,
                    emissive: 0xff4400,
                    emissiveIntensity: 0.5,
                });
                const engineGeo = new THREE.CylinderGeometry(0.12, 0.18, 0.15, 8);
                const engineL = new THREE.Mesh(engineGeo, engineMat);
                engineL.position.set(-0.25, -0.1, -0.65);
                engineL.rotation.x = Math.PI / 2;
                group.add(engineL);
                const engineR = new THREE.Mesh(engineGeo, engineMat);
                engineR.position.set(0.25, -0.1, -0.65);
                engineR.rotation.x = Math.PI / 2;
                group.add(engineR);

                const flameMat = new THREE.MeshStandardMaterial({
                    color: 0xff8844,
                    emissive: 0xff4400,
                    emissiveIntensity: 0.8,
                    transparent: true,
                    opacity: 0.7,
                });
                const flameGeo = new THREE.ConeGeometry(0.08, 0.4, 6);
                const flameL = new THREE.Mesh(flameGeo, flameMat);
                flameL.position.set(-0.25, -0.1, -0.75);
                flameL.rotation.x = Math.PI / 2;
                group.add(flameL);
                const flameR = new THREE.Mesh(flameGeo, flameMat);
                flameR.position.set(0.25, -0.1, -0.75);
                flameR.rotation.x = Math.PI / 2;
                group.add(flameR);

                group.scale.set(1.2, 1.2, 1.2);
                group.userData = { flameL, flameR, engineL, engineR };
                return group;
            }

            function createChickenMesh(type) {
                const group = new THREE.Group();
                const colors = { normal: 0xff8844, fast: 0xff4466, tank: 0x66dd88, shooter: 0x66ff66, bomber: 0xff3366 };
                const color = colors[type] || 0xff8844;

                const bodyGeo = new THREE.SphereGeometry(0.4, 8, 8);
                const bodyMat = new THREE.MeshStandardMaterial({
                    color: color,
                    metalness: 0.2,
                    roughness: 0.6,
                    emissive: color,
                    emissiveIntensity: 0.1,
                });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.scale.set(1, 0.8, 0.9);
                body.castShadow = true;
                group.add(body);

                const headGeo = new THREE.SphereGeometry(0.2, 6, 6);
                const headMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.2, roughness: 0.6 });
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.set(0, 0.25, 0.3);
                group.add(head);

                const beakGeo = new THREE.ConeGeometry(0.08, 0.15, 4);
                const beakMat = new THREE.MeshStandardMaterial({ color: 0xff8844 });
                const beak = new THREE.Mesh(beakGeo, beakMat);
                beak.position.set(0, 0.2, 0.45);
                beak.rotation.x = 0.3;
                group.add(beak);

                const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff,
                    emissiveIntensity: 0.3 });
                const eyeGeo = new THREE.SphereGeometry(0.05, 6, 6);
                const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
                eyeL.position.set(-0.12, 0.28, 0.4);
                group.add(eyeL);
                const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
                eyeR.position.set(0.12, 0.28, 0.4);
                group.add(eyeR);

                const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
                const pupilGeo = new THREE.SphereGeometry(0.025, 6, 6);
                const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
                pupilL.position.set(-0.12, 0.26, 0.43);
                group.add(pupilL);
                const pupilR = new THREE.Mesh(pupilGeo, pupilMat);
                pupilR.position.set(0.12, 0.26, 0.43);
                group.add(pupilR);

                const wingMat2 = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
                const wingGeo2 = new THREE.SphereGeometry(0.15, 6, 6);
                const wingL2 = new THREE.Mesh(wingGeo2, wingMat2);
                wingL2.position.set(-0.45, 0.05, 0);
                wingL2.scale.set(0.8, 0.5, 0.6);
                group.add(wingL2);
                const wingR2 = new THREE.Mesh(wingGeo2, wingMat2);
                wingR2.position.set(0.45, 0.05, 0);
                wingR2.scale.set(0.8, 0.5, 0.6);
                group.add(wingR2);

                if (type === 'fast') { group.scale.set(0.7, 0.7, 0.7); }
                if (type === 'tank') { group.scale.set(1.4, 1.4, 1.4); }
                if (type === 'shooter') { group.scale.set(1.0, 1.0, 1.0); }
                if (type === 'bomber') { group.scale.set(0.9, 0.9, 0.9); }

                return group;
            }

            function createBossMesh() {
                const group = new THREE.Group();

                const bodyGeo = new THREE.SphereGeometry(0.8, 12, 12);
                const bodyMat = new THREE.MeshStandardMaterial({
                    color: 0xff3366,
                    metalness: 0.6,
                    roughness: 0.3,
                    emissive: 0xff0044,
                    emissiveIntensity: 0.15,
                });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.scale.set(1.2, 0.9, 0.9);
                body.castShadow = true;
                group.add(body);

                const crownMat = new THREE.MeshStandardMaterial({
                    color: 0xffdd44,
                    metalness: 0.8,
                    roughness: 0.2,
                    emissive: 0xff8800,
                    emissiveIntensity: 0.2,
                });
                for (let i = 0; i < 5; i++) {
                    const spike = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.25, 4), crownMat);
                    const angle = (i / 5) * Math.PI * 2;
                    spike.position.set(Math.cos(angle) * 0.5, 0.6 + 0.1, Math.sin(angle) * 0.4);
                    spike.rotation.x = 0.3;
                    spike.rotation.z = angle;
                    group.add(spike);
                }

                const eyeMat2 = new THREE.MeshStandardMaterial({
                    color: 0xff0000,
                    emissive: 0xff0000,
                    emissiveIntensity: 0.5,
                });
                const eyeGeo2 = new THREE.SphereGeometry(0.1, 8, 8);
                const eyeL2 = new THREE.Mesh(eyeGeo2, eyeMat2);
                eyeL2.position.set(-0.25, 0.2, 0.6);
                group.add(eyeL2);
                const eyeR2 = new THREE.Mesh(eyeGeo2, eyeMat2);
                eyeR2.position.set(0.25, 0.2, 0.6);
                group.add(eyeR2);

                const browMat = new THREE.MeshStandardMaterial({ color: 0xcc2244 });
                const browGeo = new THREE.BoxGeometry(0.2, 0.04, 0.04);
                const browL = new THREE.Mesh(browGeo, browMat);
                browL.position.set(-0.25, 0.28, 0.6);
                browL.rotation.z = -0.3;
                group.add(browL);
                const browR = new THREE.Mesh(browGeo, browMat);
                browR.position.set(0.25, 0.28, 0.6);
                browR.rotation.z = 0.3;
                group.add(browR);

                const wingMat3 = new THREE.MeshStandardMaterial({ color: 0xcc2244, metalness: 0.3, roughness: 0.5 });
                const wingGeo3 = new THREE.BoxGeometry(0.6, 0.05, 0.3);
                const wingL3 = new THREE.Mesh(wingGeo3, wingMat3);
                wingL3.position.set(-0.8, 0, 0);
                wingL3.rotation.z = -0.4;
                wingL3.rotation.y = 0.2;
                group.add(wingL3);
                const wingR3 = new THREE.Mesh(wingGeo3, wingMat3);
                wingR3.position.set(0.8, 0, 0);
                wingR3.rotation.z = 0.4;
                wingR3.rotation.y = -0.2;
                group.add(wingR3);

                group.scale.set(1.3, 1.3, 1.3);
                return group;
            }

            function createBulletMesh() {
                const group = new THREE.Group();
                const geo = new THREE.SphereGeometry(0.08, 6, 6);
                const mat = new THREE.MeshStandardMaterial({
                    color: 0x66ddff,
                    emissive: 0x66ddff,
                    emissiveIntensity: 0.5,
                });
                const mesh = new THREE.Mesh(geo, mat);
                group.add(mesh);
                const glowMat = new THREE.MeshStandardMaterial({
                    color: 0x66ddff,
                    transparent: true,
                    opacity: 0.3,
                    emissive: 0x66ddff,
                    emissiveIntensity: 0.3,
                });
                const glow = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), glowMat);
                group.add(glow);
                return group;
            }

            function createPowerupMesh(type) {
                const group = new THREE.Group();
                const colors = { shield: 0x44ddff, rapid: 0xffaa44, multi: 0xff66ff, coin: 0xffdd44 };
                const color = colors[type] || 0xffdd44;
                const geo = new THREE.OctahedronGeometry(0.15, 0);
                const mat = new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.3,
                    metalness: 0.5,
                    roughness: 0.3,
                });
                const mesh = new THREE.Mesh(geo, mat);
                group.add(mesh);
                const ringMat = new THREE.MeshStandardMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.2,
                    emissive: color,
                    emissiveIntensity: 0.2,
                });
                const ring = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.02, 6, 12), ringMat);
                ring.rotation.x = Math.PI / 2;
                group.add(ring);
                return group;
            }

            function createExplosion(count = 30) {
                const particles = [];
                const colors = [0xff4444, 0xff8844, 0xffdd44, 0x44ddff, 0xff66ff, 0xffffff];
                for (let i = 0; i < count; i++) {
                    const size = 0.05 + Math.random() * 0.15;
                    const geo = new THREE.SphereGeometry(size, 4, 4);
                    const mat = new THREE.MeshStandardMaterial({
                        color: colors[Math.floor(Math.random() * colors.length)],
                        emissive: 0xff8844,
                        emissiveIntensity: 0.5,
                        transparent: true,
                        opacity: 1,
                    });
                    const mesh = new THREE.Mesh(geo, mat);
                    const speed = 1 + Math.random() * 4;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.random() * Math.PI;
                    mesh.userData = {
                        vx: Math.sin(phi) * Math.cos(theta) * speed,
                        vy: Math.sin(phi) * Math.sin(theta) * speed + 1,
                        vz: Math.cos(phi) * speed,
                        life: 30 + Math.random() * 30,
                        maxLife: 60,
                    };
                    particles.push(mesh);
                }
                return particles;
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── GAME OBJECTS ────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            let playerGroup = null;
            let playerFlameL = null;
            let playerFlameR = null;
            let playerBullets = [];
            let chickenObjects = [];
            let enemyBulletObjects = [];
            let powerupObjects = [];
            let particleObjects = [];
            let bossObject = null;

            // ─── ─────────────────────────────────────────────────────
            // ─── UI ELEMENTS ─────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            const scoreDisplay = document.getElementById('scoreDisplay');
            const livesDisplay = document.getElementById('livesDisplay');
            const coinsDisplay = document.getElementById('coinsDisplay');
            const levelDisplay = document.getElementById('levelDisplay');
            const comboDisplay = document.getElementById('comboDisplay');

            const finalScore = document.getElementById('finalScore');
            const finalLevel = document.getElementById('finalLevel');
            const finalCombo = document.getElementById('finalCombo');
            const finalCoins = document.getElementById('finalCoins');

            const menuShips = document.getElementById('menuShips');
            const menuAch = document.getElementById('menuAch');
            const menuCoins = document.getElementById('menuCoins');
            const menuLevel = document.getElementById('menuLevel');

            // ─── ─────────────────────────────────────────────────────
            // ─── SHIP MANAGEMENT ────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            function createPlayerShip() {
                if (playerGroup) {
                    scene.remove(playerGroup);
                    playerGroup = null;
                }
                const shipId = game.selectedShip;
                playerGroup = createShipMesh(shipId);
                playerGroup.position.set(0, 0.5, 4);
                scene.add(playerGroup);
                if (playerGroup.userData) {
                    playerFlameL = playerGroup.userData.flameL;
                    playerFlameR = playerGroup.userData.flameR;
                }
                return playerGroup;
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── SAVE / LOAD ────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            function saveData() {
                try {
                    const data = {
                        coins: game.coins,
                        level: game.level,
                        highScore: game.highScore,
                        unlockedShips: game.unlockedShips,
                        selectedShip: game.selectedShip,
                        upgrades: game.upgrades,
                        achievements: game.achievements,
                        totalKills: game.totalKills,
                        totalGames: game.totalGames,
                        highestLevel: game.highestLevel,
                        maxCombo: game.maxCombo,
                    };
                    localStorage.setItem('chickenInvaders3DData', JSON.stringify(data));
                } catch (e) {}
            }

            function loadData() {
                try {
                    const raw = localStorage.getItem('chickenInvaders3DData');
                    if (!raw) return;
                    const data = JSON.parse(raw);
                    game.coins = data.coins || 0;
                    game.level = data.level || 1;
                    game.highScore = data.highScore || 0;
                    game.unlockedShips = data.unlockedShips || [0];
                    game.selectedShip = data.selectedShip || 0;
                    game.upgrades = data.upgrades || { speed: 0, fireRate: 0, damage: 0, shield: 0 };
                    game.achievements = data.achievements || [];
                    game.totalKills = data.totalKills || 0;
                    game.totalGames = data.totalGames || 0;
                    game.highestLevel = data.highestLevel || 0;
                    game.maxCombo = data.maxCombo || 0;
                } catch (e) {}
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── UPDATE HUD ─────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            function updateHUD() {
                scoreDisplay.textContent = game.score;
                livesDisplay.textContent = game.lives;
                coinsDisplay.textContent = game.coins;
                levelDisplay.textContent = game.level;
                if (game.combo > 1) {
                    comboDisplay.textContent = '🔥 x' + game.combo;
                    comboDisplay.classList.add('active');
                } else {
                    comboDisplay.classList.remove('active');
                }
                menuShips.textContent = game.unlockedShips.length;
                menuAch.textContent = game.achievements.length;
                menuCoins.textContent = game.coins;
                menuLevel.textContent = game.highestLevel || 1;
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── GAME FUNCTIONS ─────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            function startGame() {
                // Reset game state
                game.score = 0;
                game.combo = 0;
                game.comboTimeout = 0;
                game.lives = 3;
                game.stage = 1;
                game.waveActive = false;
                game.bossActive = false;
                game.bossDefeated = false;
                game.gameOver = false;
                game.levelComplete = false;
                game.frame = 0;
                game.spawnTimer = 0;
                game.bossIntro = 0;
                game.dying = false;
                game.deathTimer = 0;
                game.screenShake = 0;
                game.shootCooldown = 0;
                game.playerX = 0;
                game.boss = null;
                game.chickens = [];
                game.bullets = [];
                game.enemyBullets = [];
                game.powerups = [];
                game.particles = [];

                // Clear 3D objects
                for (const obj of chickenObjects) { scene.remove(obj); }
                chickenObjects = [];
                for (const obj of enemyBulletObjects) { scene.remove(obj); }
                enemyBulletObjects = [];
                for (const obj of powerupObjects) { scene.remove(obj); }
                powerupObjects = [];
                for (const obj of particleObjects) { scene.remove(obj); }
                particleObjects = [];
                if (bossObject) { scene.remove(bossObject);
                    bossObject = null; }
                for (const obj of playerBullets) { scene.remove(obj); }
                playerBullets = [];

                createPlayerShip();
                if (playerGroup) {
                    playerGroup.position.set(0, 0.5, 4);
                    playerGroup.visible = true;
                }

                gameoverEl.classList.remove('show');
                menuEl.classList.add('hidden');

                startWave();
                updateHUD();
                showToast('🚀 Level ' + game.level + ' - Stage ' + game.stage);
            }

            function startWave() {
                game.bossDefeated = false;
                game.bossActive = false;
                game.boss = null;
                if (bossObject) { scene.remove(bossObject);
                    bossObject = null; }
                game.bossIntro = 0;
                game.levelComplete = false;
                game.waveActive = true;
                game.chickens = [];
                const count = 5 + Math.floor((game.level - 1) * 1.5);
                game.chickensInWave = Math.min(count, 15);
                game.chickensSpawnedInWave = 0;
                game.spawnTimer = 0;
                showToast('🐔 Wave ' + game.stage + ' - ' + game.chickensInWave + ' chickens');
            }

            function spawnChicken3D() {
                const x = (Math.random() - 0.5) * 12;
                const z = -8 - Math.random() * 6;
                const type = determineChickenType();
                const mesh = createChickenMesh(type);
                mesh.position.set(x, 0.5 + Math.random() * 1, z);
                mesh.castShadow = true;
                scene.add(mesh);

                const speed = 0.04 + (game.level - 1) * 0.005 + Math.random() * 0.02;
                const hp = type === 'tank' ? 3 : type === 'shooter' ? 2 : type === 'bomber' ? 2 : 1;

                game.chickens.push({
                    mesh: mesh,
                    x: x,
                    y: 0.5 + Math.random() * 1,
                    z: z,
                    speed: Math.min(speed, 0.12),
                    hp: hp,
                    maxHp: hp,
                    type: type,
                    shootTimer: 0,
                    shootInterval: 60 + Math.floor(Math.random() * 40),
                    hitFlash: 0,
                    bobPhase: Math.random() * Math.PI * 2,
                });
                chickenObjects.push(mesh);
                game.chickensSpawnedInWave++;
            }

            function determineChickenType() {
                const r = Math.random();
                const level = game.level;
                if (level > 2 && r < 0.15) return 'fast';
                if (level > 4 && r < 0.25) return 'tank';
                if (level >= 2 && r < 0.35) return 'shooter';
                if (level >= 3 && r < 0.45) return 'bomber';
                return 'normal';
            }

            function spawnBoss3D() {
                const mesh = createBossMesh();
                mesh.position.set(0, 2, -10);
                mesh.castShadow = true;
                scene.add(mesh);
                bossObject = mesh;

                const health = 30 + game.level * 10;
                game.boss = {
                    mesh: mesh,
                    x: 0,
                    y: 2,
                    z: -10,
                    health: health,
                    maxHealth: health,
                    speed: 0.03 + game.level * 0.002,
                    dir: 1,
                    phase: 0,
                    attackTimer: 0,
                    attackInterval: 60 - Math.min(game.level * 2, 30),
                    enterY: 1.5,
                    entered: false,
                    hitFlash: 0,
                    pattern: 0,
                };
                game.bossActive = true;
                game.bossDefeated = false;
                game.bossIntro = 90;
                game.waveActive = false;
                showToast('⚔ BOSS APPROACHING! ⚔', 2000);
            }

            function shootBullet() {
                if (game.dying || game.gameOver) return;
                if (game.shootCooldown > 0) return;

                const ship = SHIPS[game.selectedShip] || { fireRate: 1 };
                const fireRate = ship.fireRate * (1 - game.upgrades.fireRate * 0.06);
                const baseCd = Math.max(3, Math.round(8 * fireRate));
                game.shootCooldown = baseCd;

                const bullet = createBulletMesh();
                const pPos = playerGroup ? playerGroup.position : new THREE.Vector3(0, 0.5, 4);
                bullet.position.set(pPos.x, pPos.y + 0.2, pPos.z - 0.8);
                scene.add(bullet);
                playerBullets.push(bullet);
            }

            function spawnPowerup3D(x, y, z) {
                const types = ['coin', 'coin', 'coin', 'shield', 'rapid', 'multi'];
                const type = types[Math.floor(Math.random() * types.length)];
                const mesh = createPowerupMesh(type);
                mesh.position.set(x, y, z);
                scene.add(mesh);
                powerupObjects.push(mesh);
                game.powerups.push({
                    mesh: mesh,
                    type: type,
                    x: x,
                    y: y,
                    z: z,
                });
            }

            function triggerDeath() {
                if (game.dying) return;
                game.dying = true;
                game.deathTimer = 0;
                game.screenShake = 15;

                if (playerGroup) {
                    const exp = createExplosion(40);
                    for (const p of exp) {
                        p.position.copy(playerGroup.position);
                        scene.add(p);
                        particleObjects.push(p);
                    }
                    playerGroup.visible = false;
                    playerGroup.position.set(0, -10, 0);
                }

                if (options.vibration && navigator.vibrate) {
                    navigator.vibrate([100, 50, 100]);
                }
                game.lives--;
                updateHUD();
                showToast('💥 Hit! ' + game.lives + ' lives left', 1500);
            }

            function showGameOver() {
                gameoverEl.classList.add('show');
                finalScore.textContent = game.score;
                finalLevel.textContent = game.level;
                finalCombo.textContent = game.maxCombo;
                finalCoins.textContent = game.coins;
                if (game.score > game.highScore) {
                    game.highScore = game.score;
                    showToast('🏆 NEW HIGH SCORE: ' + game.highScore + '!', 3000);
                }
                if (game.level > game.highestLevel) {
                    game.highestLevel = game.level;
                }
                game.totalGames++;
                saveData();
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── UPDATE ─────────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            function updateGame() {
                if (game.gameOver) return;
                if (game.dying) {
                    game.deathTimer++;
                    if (game.deathTimer > 60) {
                        game.dying = false;
                        game.deathTimer = 0;
                        if (game.lives <= 0) {
                            game.gameOver = true;
                            showGameOver();
                            return;
                        }
                        if (playerGroup) {
                            playerGroup.position.set(0, 0.5, 4);
                            playerGroup.visible = true;
                        }
                        game.lives--;
                        updateHUD();
                        showToast('💪 Respawn!', 1000);
                    }
                    return;
                }

                game.frame++;

                // ── Keyboard movement ──
                const speed = 0.12 * (SHIPS[game.selectedShip]?.speed || 1);
                if (game.keys.left) {
                    game.playerX -= speed * 0.8;
                }
                if (game.keys.right) {
                    game.playerX += speed * 0.8;
                }
                // Clamp
                game.playerX = Math.max(-5, Math.min(5, game.playerX));

                // Player movement (touch/mouse takes priority if active)
                if (playerGroup) {
                    let targetX = game.playerX;
                    if (game.touchX !== null) {
                        targetX = game.touchX;
                    }
                    const dx = targetX - playerGroup.position.x;
                    playerGroup.position.x += dx * 0.12;
                    playerGroup.position.x = Math.max(-5, Math.min(5, playerGroup.position.x));

                    if (playerFlameL && playerFlameR) {
                        const flicker = 0.6 + Math.random() * 0.4;
                        playerFlameL.material.opacity = 0.5 + Math.random() * 0.3;
                        playerFlameR.material.opacity = 0.5 + Math.random() * 0.3;
                        const scale = 0.5 + Math.random() * 0.5;
                        playerFlameL.scale.z = scale;
                        playerFlameR.scale.z = scale;
                    }
                }

                // Shooting (keyboard space or touch)
                if (game.shootCooldown > 0) game.shootCooldown--;
                if (game.touchActive || keys.space) {
                    if (game.shootCooldown <= 0) {
                        shootBullet();
                    }
                }

                // Update player bullets
                for (let i = playerBullets.length - 1; i >= 0; i--) {
                    const b = playerBullets[i];
                    b.position.z -= 0.3;
                    if (b.position.z < -12) {
                        scene.remove(b);
                        playerBullets.splice(i, 1);
                        continue;
                    }
                    let hit = false;
                    for (let j = game.chickens.length - 1; j >= 0; j--) {
                        const c = game.chickens[j];
                        const dist = b.position.distanceTo(c.mesh.position);
                        if (dist < 0.5) {
                            c.hp--;
                            c.hitFlash = 10;
                            if (c.hp <= 0) {
                                const exp = createExplosion(20);
                                for (const p of exp) {
                                    p.position.copy(c.mesh.position);
                                    scene.add(p);
                                    particleObjects.push(p);
                                }
                                scene.remove(c.mesh);
                                chickenObjects.splice(chickenObjects.indexOf(c.mesh), 1);
                                game.chickens.splice(j, 1);
                                game.totalKills++;
                                game.combo++;
                                game.comboTimeout = 60;
                                if (game.combo > game.maxCombo) game.maxCombo = game.combo;
                                const pts = 10 + Math.floor(game.combo / 5) * 2;
                                game.score += pts;
                                if (Math.random() < 0.15) {
                                    spawnPowerup3D(c.mesh.position.x, c.mesh.position.y, c.mesh.position.z);
                                }
                                game.screenShake = Math.min(3, game.combo / 5);
                            }
                            hit = true;
                            break;
                        }
                    }
                    if (hit) {
                        scene.remove(b);
                        playerBullets.splice(i, 1);
                        continue;
                    }
                    if (game.boss && game.boss.mesh && !game.bossDefeated) {
                        const dist = b.position.distanceTo(game.boss.mesh.position);
                        if (dist < 0.8) {
                            game.boss.health -= 1 + game.upgrades.damage * 0.15;
                            game.boss.hitFlash = 10;
                            const exp = createExplosion(10);
                            for (const p of exp) {
                                p.position.copy(b.position);
                                scene.add(p);
                                particleObjects.push(p);
                            }
                            scene.remove(b);
                            playerBullets.splice(i, 1);
                            if (game.boss.health <= 0) {
                                game.bossDefeated = true;
                                game.bossActive = false;
                                const exp2 = createExplosion(60);
                                for (const p of exp2) {
                                    p.position.copy(game.boss.mesh.position);
                                    scene.add(p);
                                    particleObjects.push(p);
                                }
                                scene.remove(game.boss.mesh);
                                bossObject = null;
                                game.boss = null;
                                game.score += 100 + game.level * 25;
                                game.coins += 50 + game.level * 5;
                                game.screenShake = 20;
                                showToast('💀 BOSS DEFEATED! +' + (50 + game.level * 5) + ' coins!', 2000);
                                game.level++;
                                game.stage = 1;
                                game.levelComplete = true;
                                setTimeout(() => {
                                    game.levelComplete = false;
                                    if (!game.gameOver) {
                                        startWave();
                                        updateHUD();
                                        showToast('🚀 LEVEL ' + game.level + '!');
                                    }
                                }, 2000);
                                saveData();
                            }
                            continue;
                        }
                    }
                }

                // Chicken AI
                for (let i = game.chickens.length - 1; i >= 0; i--) {
                    const c = game.chickens[i];
                    c.mesh.position.z += c.speed;
                    c.bobPhase += 0.05;
                    c.mesh.position.y = c.y + Math.sin(c.bobPhase) * 0.1;

                    if (c.hitFlash > 0) c.hitFlash--;

                    if (c.type === 'shooter') {
                        c.shootTimer++;
                        if (c.shootTimer >= c.shootInterval && playerGroup) {
                            c.shootTimer = 0;
                            const dir = new THREE.Vector3()
                                .copy(playerGroup.position)
                                .sub(c.mesh.position)
                                .normalize();
                            const bullet = createBulletMesh();
                            bullet.position.copy(c.mesh.position);
                            bullet.position.y += 0.2;
                            bullet.scale.set(0.7, 0.7, 0.7);
                            bullet.material = new THREE.MeshStandardMaterial({
                                color: 0x66ff66,
                                emissive: 0x66ff66,
                                emissiveIntensity: 0.5,
                            });
                            bullet.userData = { dir: dir };
                            scene.add(bullet);
                            enemyBulletObjects.push(bullet);
                            game.enemyBullets.push({ mesh: bullet, dir: dir });
                        }
                    }

                    if (c.mesh.position.z > 4.5) {
                        if (!game.dying) {
                            triggerDeath();
                        }
                        scene.remove(c.mesh);
                        chickenObjects.splice(chickenObjects.indexOf(c.mesh), 1);
                        game.chickens.splice(i, 1);
                        continue;
                    }

                    if (playerGroup) {
                        const dist = c.mesh.position.distanceTo(playerGroup.position);
                        if (dist < 0.6 && !game.dying) {
                            triggerDeath();
                            scene.remove(c.mesh);
                            chickenObjects.splice(chickenObjects.indexOf(c.mesh), 1);
                            game.chickens.splice(i, 1);
                            continue;
                        }
                    }
                }

                // Enemy bullets
                for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
                    const eb = game.enemyBullets[i];
                    eb.mesh.position.x += eb.dir.x * 0.06;
                    eb.mesh.position.y += eb.dir.y * 0.06;
                    eb.mesh.position.z += eb.dir.z * 0.06;
                    if (eb.mesh.position.z > 6 || eb.mesh.position.z < -12) {
                        scene.remove(eb.mesh);
                        enemyBulletObjects.splice(enemyBulletObjects.indexOf(eb.mesh), 1);
                        game.enemyBullets.splice(i, 1);
                        continue;
                    }
                    if (playerGroup) {
                        const dist = eb.mesh.position.distanceTo(playerGroup.position);
                        if (dist < 0.5 && !game.dying) {
                            triggerDeath();
                            scene.remove(eb.mesh);
                            enemyBulletObjects.splice(enemyBulletObjects.indexOf(eb.mesh), 1);
                            game.enemyBullets.splice(i, 1);
                            continue;
                        }
                    }
                }

                // Powerups
                for (let i = game.powerups.length - 1; i >= 0; i--) {
                    const p = game.powerups[i];
                    p.mesh.position.z += 0.04;
                    p.mesh.rotation.y += 0.03;
                    p.mesh.position.y = p.y + Math.sin(game.frame * 0.05 + i) * 0.1;
                    if (p.mesh.position.z > 5) {
                        scene.remove(p.mesh);
                        powerupObjects.splice(powerupObjects.indexOf(p.mesh), 1);
                        game.powerups.splice(i, 1);
                        continue;
                    }
                    if (playerGroup) {
                        const dist = p.mesh.position.distanceTo(playerGroup.position);
                        if (dist < 0.6) {
                            const exp = createExplosion(15);
                            for (const pt of exp) {
                                pt.position.copy(p.mesh.position);
                                scene.add(pt);
                                particleObjects.push(pt);
                            }
                            scene.remove(p.mesh);
                            powerupObjects.splice(powerupObjects.indexOf(p.mesh), 1);
                            game.powerups.splice(i, 1);
                            if (p.type === 'coin') {
                                const bonus = 5 + Math.floor(Math.random() * 10);
                                game.coins += bonus;
                                showToast('💰 +' + bonus + ' coins!', 800);
                            } else {
                                showToast('⚡ ' + p.type.toUpperCase() + '!', 800);
                            }
                            saveData();
                            updateHUD();
                            continue;
                        }
                    }
                }

                // Boss AI
                if (game.bossActive && game.boss && game.boss.mesh) {
                    const boss = game.boss;
                    if (boss.hitFlash > 0) boss.hitFlash--;

                    if (game.bossIntro > 0) {
                        game.bossIntro--;
                        boss.mesh.position.y += (boss.enterY - boss.mesh.position.y) * 0.02;
                        if (game.bossIntro === 0) boss.entered = true;
                    } else if (boss.entered) {
                        boss.phase += 0.015;
                        const pattern = Math.floor(boss.phase / 10) % 3;
                        const amp = 2 + Math.sin(game.level * 0.5) * 0.5;

                        if (pattern === 0) {
                            boss.mesh.position.x += boss.speed * boss.dir;
                            boss.mesh.position.y = boss.enterY + Math.sin(boss.phase * 1.5) * 0.5;
                            if (boss.mesh.position.x > 5 || boss.mesh.position.x < -5) boss.dir *= -1;
                        } else if (pattern === 1) {
                            boss.mesh.position.x += boss.speed * 1.8 * boss.dir;
                            boss.mesh.position.y = boss.enterY + Math.sin(boss.phase * 0.7) * 0.4;
                            if (boss.mesh.position.x > 5 || boss.mesh.position.x < -5) boss.dir *= -1;
                        } else {
                            boss.mesh.position.x = Math.sin(boss.phase * 0.9) * amp;
                            boss.mesh.position.y = boss.enterY + Math.cos(boss.phase * 0.6) * 0.6;
                        }

                        boss.attackTimer++;
                        if (boss.attackTimer >= boss.attackInterval && playerGroup) {
                            boss.attackTimer = 0;
                            const dir = new THREE.Vector3()
                                .copy(playerGroup.position)
                                .sub(boss.mesh.position)
                                .normalize();
                            for (let s = 0; s < 2 + Math.floor(game.level / 5); s++) {
                                const spread = 0.1;
                                const bullet = createBulletMesh();
                                bullet.position.copy(boss.mesh.position);
                                bullet.position.y += 0.3;
                                bullet.scale.set(0.8, 0.8, 0.8);
                                bullet.material = new THREE.MeshStandardMaterial({
                                    color: 0xff4466,
                                    emissive: 0xff4466,
                                    emissiveIntensity: 0.5,
                                });
                                const d = new THREE.Vector3().copy(dir);
                                d.x += (Math.random() - 0.5) * spread;
                                d.y += (Math.random() - 0.5) * spread;
                                d.normalize();
                                bullet.userData = { dir: d };
                                scene.add(bullet);
                                enemyBulletObjects.push(bullet);
                                game.enemyBullets.push({ mesh: bullet, dir: d });
                            }
                        }
                    }
                }

                // Particles
                for (let i = particleObjects.length - 1; i >= 0; i--) {
                    const p = particleObjects[i];
                    const data = p.userData;
                    if (data) {
                        p.position.x += data.vx * 0.02;
                        p.position.y += data.vy * 0.02;
                        p.position.z += data.vz * 0.02;
                        data.vy -= 0.02;
                        data.life--;
                        p.material.opacity = data.life / data.maxLife;
                        const scale = data.life / data.maxLife;
                        p.scale.set(scale, scale, scale);
                        if (data.life <= 0) {
                            scene.remove(p);
                            particleObjects.splice(i, 1);
                        }
                    } else {
                        scene.remove(p);
                        particleObjects.splice(i, 1);
                    }
                }

                // Screen shake
                if (game.screenShake > 0) {
                    game.screenShake *= 0.92;
                    if (game.screenShake < 0.01) game.screenShake = 0;
                    const shake = game.screenShake * 0.01;
                    camera.position.x = Math.sin(game.frame * 0.5) * shake;
                    camera.position.y = 10 + Math.cos(game.frame * 0.7) * shake * 0.5;
                } else {
                    camera.position.x = 0;
                    camera.position.y = 10;
                }
                camera.lookAt(0, 0, 0);

                // Combo timeout
                if (game.comboTimeout > 0) {
                    game.comboTimeout--;
                    if (game.comboTimeout === 0) game.combo = 0;
                }

                // Spawn chickens
                if (game.waveActive && !game.bossActive && !game.levelComplete) {
                    const delay = Math.max(10, 30 - game.level * 1.5);
                    game.spawnTimer++;
                    if (game.spawnTimer >= delay && game.chickensSpawnedInWave < game.chickensInWave) {
                        game.spawnTimer = 0;
                        spawnChicken3D();
                    }
                    if (game.chickensSpawnedInWave >= game.chickensInWave && game.chickens.length === 0) {
                        game.waveActive = false;
                        game.stage++;
                        if (game.stage > 8) {
                            spawnBoss3D();
                        } else {
                            setTimeout(() => {
                                if (!game.gameOver && !game.bossActive && !game.levelComplete) {
                                    startWave();
                                }
                            }, 600);
                        }
                    }
                }

                updateHUD();
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── INPUT HANDLING ─────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            let keys = { space: false };
            let touchX = null;

            // ─── MENU BUTTON EVENTS ─────────────────────────────────

            playBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                startGame();
            });
            playBtn.addEventListener('touchend', function(e) {
                e.stopPropagation();
                e.preventDefault();
                startGame();
            });

            shopBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                showToast('🛒 Shop coming soon in 3D!', 2000);
            });
            shopBtn.addEventListener('touchend', function(e) {
                e.stopPropagation();
                e.preventDefault();
                showToast('🛒 Shop coming soon in 3D!', 2000);
            });

            statsBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                showToast('📊 Stats: ' + game.totalKills + ' kills, ' + game.achievements.length +
                    '/12 achievements', 2000);
            });
            statsBtn.addEventListener('touchend', function(e) {
                e.stopPropagation();
                e.preventDefault();
                showToast('📊 Stats: ' + game.totalKills + ' kills, ' + game.achievements.length +
                    '/12 achievements', 2000);
            });

            retryBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                startGame();
            });
            retryBtn.addEventListener('touchend', function(e) {
                e.stopPropagation();
                e.preventDefault();
                startGame();
            });

            menuBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                gameoverEl.classList.remove('show');
                menuEl.classList.remove('hidden');
                updateHUD();
                if (playerGroup) {
                    playerGroup.position.set(0, 0.5, 4);
                    playerGroup.visible = true;
                }
            });
            menuBtn.addEventListener('touchend', function(e) {
                e.stopPropagation();
                e.preventDefault();
                gameoverEl.classList.remove('show');
                menuEl.classList.remove('hidden');
                updateHUD();
                if (playerGroup) {
                    playerGroup.position.set(0, 0.5, 4);
                    playerGroup.visible = true;
                }
            });

            // ─── CANVAS INPUT (Touch/Mouse) ────────────────────────

            const canvas = renderer.domElement;

            canvas.addEventListener('touchstart', function(e) {
                if (!menuEl.classList.contains('hidden')) return;
                if (gameoverEl.classList.contains('show')) return;
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
                touchX = x * 5;
                game.touchX = touchX;
                game.touchActive = true;
            }, { passive: false });

            canvas.addEventListener('touchmove', function(e) {
                if (!menuEl.classList.contains('hidden')) return;
                if (gameoverEl.classList.contains('show')) return;
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
                touchX = x * 5;
                game.touchX = touchX;
            }, { passive: false });

            canvas.addEventListener('touchend', function(e) {
                e.preventDefault();
                game.touchActive = false;
                game.touchX = null;
            }, { passive: false });

            // Mouse
            let mouseDown = false;
            canvas.addEventListener('mousedown', function(e) {
                if (!menuEl.classList.contains('hidden')) return;
                if (gameoverEl.classList.contains('show')) return;
                mouseDown = true;
                const rect = canvas.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                touchX = x * 5;
                game.touchX = touchX;
                game.touchActive = true;
            });

            canvas.addEventListener('mousemove', function(e) {
                if (!mouseDown) return;
                if (!menuEl.classList.contains('hidden')) return;
                if (gameoverEl.classList.contains('show')) return;
                const rect = canvas.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                touchX = x * 5;
                game.touchX = touchX;
            });

            canvas.addEventListener('mouseup', function() {
                mouseDown = false;
                game.touchActive = false;
                game.touchX = null;
            });

            canvas.addEventListener('mouseleave', function() {
                mouseDown = false;
                game.touchActive = false;
                game.touchX = null;
            });

            // ─── KEYBOARD ──────────────────────────────────────────────

            document.addEventListener('keydown', function(e) {
                const key = e.key;
                // Movement keys
                if (key === 'a' || key === 'A' || key === 'ArrowLeft') {
                    e.preventDefault();
                    game.keys.left = true;
                }
                if (key === 'd' || key === 'D' || key === 'ArrowRight') {
                    e.preventDefault();
                    game.keys.right = true;
                }
                // Shoot
                if (key === ' ' || key === 'Space') {
                    e.preventDefault();
                    keys.space = true;
                    // If menu is visible, start game
                    if (!menuEl.classList.contains('hidden')) {
                        startGame();
                    }
                }
                // Retry
                if (key === 'r' || key === 'R') {
                    if (game.gameOver || gameoverEl.classList.contains('show')) {
                        startGame();
                    }
                }
                // Menu
                if (key === 'm' || key === 'M') {
                    if (gameoverEl.classList.contains('show')) {
                        gameoverEl.classList.remove('show');
                        menuEl.classList.remove('hidden');
                        updateHUD();
                        if (playerGroup) {
                            playerGroup.position.set(0, 0.5, 4);
                            playerGroup.visible = true;
                        }
                    }
                }
                // Enter to start from menu
                if (key === 'Enter') {
                    if (!menuEl.classList.contains('hidden')) {
                        startGame();
                    }
                }
            });

            document.addEventListener('keyup', function(e) {
                const key = e.key;
                if (key === 'a' || key === 'A' || key === 'ArrowLeft') {
                    e.preventDefault();
                    game.keys.left = false;
                }
                if (key === 'd' || key === 'D' || key === 'ArrowRight') {
                    e.preventDefault();
                    game.keys.right = false;
                }
                if (key === ' ' || key === 'Space') {
                    e.preventDefault();
                    keys.space = false;
                }
            });

            // ─── ─────────────────────────────────────────────────────
            // ─── ANIMATION LOOP ─────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            function animate() {
                requestAnimationFrame(animate);

                // Only update game if playing and menu hidden
                if (!menuEl.classList.contains('hidden') || gameoverEl.classList.contains('show')) {
                    stars.rotation.y += 0.0002;
                    renderer.render(scene, camera);
                    return;
                }

                updateGame();
                stars.rotation.y += 0.0002;
                renderer.render(scene, camera);
            }

            // ─── ─────────────────────────────────────────────────────
            // ─── RESIZE ─────────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            window.addEventListener('resize', function() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            // ─── ─────────────────────────────────────────────────────
            // ─── START ──────────────────────────────────────────────
            // ─── ─────────────────────────────────────────────────────

            loadData();
            createPlayerShip();
            updateHUD();

            // Show menu
            menuEl.classList.remove('hidden');
            gameoverEl.classList.remove('show');

            // Start animation loop
            animate();

            console.log('🐔 CHICKEN INVADERS 3D loaded!');
            console.log('⌨️ WASD / Arrow Keys to move, Space to shoot');

        })();
    </script>
</body>
</html>
