                    ctx.drawImage(bulletSprite, b.x, b.y, b.w, b.h);
                }

                // Enemy bullets
                for (const eb of game.enemyBullets) {
                    ctx.fillStyle = '#66ff66';
                    ctx.shadowColor = '#66ff66';
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(eb.x + eb.w / 2, eb.y + eb.h / 2, eb.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // Boss bullets
                for (const bb of game.bossBullets) {
                    ctx.fillStyle = '#ff4466';
                    ctx.shadowColor = '#ff4466';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(bb.x + bb.w / 2, bb.y + bb.h / 2, bb.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // Powerups
                for (const p of game.powerups) {
                    ctx.drawImage(p.sprite, p.x, p.y, p.w, p.h);
                }

                // HUD
                ctx.fillStyle = '#c0d8e8';
                ctx.font = '14px "Courier New", monospace';
                ctx.fillText(`Score: ${game.score}`, 8, 24);
                ctx.fillText(`Lv:${game.level}`, 8, 44);
                ctx.fillText(`St:${game.stage}/${STAGES_PER_LEVEL}`, 8, 64);

                for (let i = 0; i < game.player.lives; i++) {
                    ctx.fillStyle = '#ff4466';
                    ctx.fillText('❤️', 130 + i * 22, 26);
                }

                let hudX = 200;
                if (game.player.shield) {
                    ctx.fillStyle = '#44ddff';
                    ctx.font = '14px "Courier New", monospace';
                    ctx.fillText('🛡', hudX, 24);
                    hudX += 20;
                }
                if (game.player.hasRapid) {
                    ctx.fillStyle = '#ffaa44';
                    ctx.fillText('⚡', hudX, 24);
                    hudX += 20;
                }
                if (game.player.hasMulti) {
                    ctx.fillStyle = '#ff66ff';
                    ctx.fillText('✧', hudX, 24);
                }

                if (game.combo > 1) {
                    ctx.fillStyle = '#ffdd44';
                    ctx.font = 'bold 14px "Courier New", monospace';
                    ctx.fillText(`🔥 x${game.combo}`, 8, 88);
                }

                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.font = '10px "Courier New", monospace';
                ctx.fillText(options.music ? '🎵' : '🔇', W - 20, 20);

                if (game.waveActive && !game.bossActive) {
                    const total = game.chickensInWave;
                    const done = game.chickensSpawnedInWave - game.chickens.length;
                    const pct = Math.min(1, done / total);
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.fillRect(100, 48, 80, 8);
                    ctx.fillStyle = '#66ccff';
                    ctx.fillRect(100, 48, 80 * pct, 8);
                    ctx.fillStyle = '#8899aa';
                    ctx.font = '9px "Courier New", monospace';
                    ctx.fillText(`${Math.floor(pct*100)}%`, 186, 56);
                }

                if (game.bossIntro > 0) {
                    ctx.fillStyle = '#ff3366';
                    ctx.font = 'bold 28px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚔ BOSS APPROACHING ⚔', W / 2, H / 2 - 20);
                    ctx.textAlign = 'left';
                }

                if (game.levelComplete) {
                    ctx.fillStyle = '#ffdd44';
                    ctx.font = 'bold 24px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(`⭐ LEVEL ${game.level-1} COMPLETE! ⭐`, W / 2, H / 2 - 20);
                    ctx.textAlign = 'left';
                }

                if (!game.touchShoot && !game.gameOver && game.frame < 180 && !game.dying) {
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.font = '12px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('👆 Touch to move & shoot', W / 2, H - 20);
                    ctx.textAlign = 'left';
                }

                if (game.dying && game.deathTimer < 20) {
                    const flashAlpha = (20 - game.deathTimer) / 20 * 0.5;
                    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
                    ctx.fillRect(0, 0, W, H);
                }

                ctx.restore();
            }

            // ─── Game Over Drawing ──────────────────────────────────

            function drawGameOver() {
                ctx.clearRect(0, 0, W, H);
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#0a0a18');
                grad.addColorStop(0.5, '#0d1025');
                grad.addColorStop(1, '#0a0a18');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);
                drawStars();

                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, W, H);

                ctx.fillStyle = '#ff4466';
                ctx.font = 'bold 42px "Courier New", monospace';
                ctx.textAlign = 'center';
                const pulseY = Math.sin(Date.now() * 0.003) * 3;
                ctx.fillText('💀 GAME OVER', W / 2, H / 2 - 80 + pulseY);
                ctx.font = '22px "Courier New", monospace';
                ctx.fillStyle = '#ddd';
                ctx.fillText(`Score: ${game.score}  |  Level: ${game.level}`, W / 2, H / 2 - 20);
                ctx.fillStyle = '#ffdd44';
                ctx.fillText(`Max Combo: x${game.maxCombo}`, W / 2, H / 2 + 20);

                const bw = 80,
                    bh = 40;
                const spacing = 20;
                const totalWidth = bw * 2 + spacing;
                const startX = W / 2 - totalWidth / 2;
                const btnY = H / 2 + 60;

                ctx.fillStyle = 'rgba(40,70,120,0.8)';
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(100,200,255,0.3)';
                ctx.beginPath();
                ctx.roundRect(startX, btnY, bw, bh, 6);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#66ddff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(startX, btnY, bw, bh, 6);
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.font = '16px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('RETRY', startX + bw / 2, btnY + bh / 2);

                ctx.fillStyle = 'rgba(30,30,50,0.8)';
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(255,255,255,0.1)';
                ctx.beginPath();
                ctx.roundRect(startX + bw + spacing, btnY, bw, bh, 6);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#8899bb';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.roundRect(startX + bw + spacing, btnY, bw, bh, 6);
                ctx.stroke();
                ctx.fillStyle = '#ccc';
                ctx.font = '16px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('MENU', startX + bw + spacing + bw / 2, btnY + bh / 2);

                ctx.textBaseline = 'alphabetic';

                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.font = '11px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('Press R to retry  •  M for menu', W / 2, H - 30);
                ctx.textAlign = 'left';
            }

            // ─── Main Loop ──────────────────────────────────────────

            function loop() {
                if (appState === 'menu') {
                    drawMenu();
                } else if (appState === 'playing') {
                    updateGame();
                    if (appState === 'gameover') {
                        drawGameOver();
                    } else {
                        drawGame();
                    }
                } else if (appState === 'gameover') {
                    drawGameOver();
                }
                requestAnimationFrame(loop);
            }

            // ─── Polyfill ──────────────────────────────────────────────
            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                    if (r > w / 2) r = w / 2;
                    if (r > h / 2) r = h / 2;
                    this.moveTo(x + r, y);
                    this.lineTo(x + w - r, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + r);
                    this.lineTo(x + w, y + h - r);
                    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                    this.lineTo(x + r, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - r);
                    this.lineTo(x, y + r);
                    this.quadraticCurveTo(x, y, x + r, y);
                    return this;
                };
            }

            // ─── Start ──────────────────────────────────────────────────
            appState = 'menu';
            updateOptionsButtons();
            if (options.music) setTimeout(startBGM, 300);
            loop();

            console.log('🐔 CHICKEN INVADERS – REALISTIC SHIP!');
            console.log('🛸 New 12x12 ship with cockpit glow and dual thrusters!');

        })();
    </script>
</body>
